name: CI

# Her push ve PR'da: cevrimdisi birim testleri + niyet regresyon kapisi.
# Gercek API cagrisi YAPILMAZ (fake LLM + TF-IDF intent); dummy key'ler yalniz
# config dogrulamasini (non-empty) gecmek icindir.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      INTENT_ROUTER: tfidf
      LLM_PROVIDER: cerebras
      CEREBRAS_API_KEY: ci-dummy
      NOVITA_API_KEY: ci-dummy
      OTEL_SDK_DISABLED: "1"
      JWT_SECRET: ci-test-secret-min-32-characters-long-xx
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Bagimliliklari kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Birim testleri (cevrimdisi)
        run: pytest tests/unit -q
      - name: Niyet regresyon kapisi (eval-gate)
        run: python -m evaluation.intent_eval --check
