- id: 4.4.1
  section: 4.4.1
  category: Logging and Auditing
  title: Configure iptables (IPv4)
  description: 'CIS Benchmark kurali: Configure iptables (IPv4)'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S4/4.4/4.4.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S4/4.4/4.4.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS 4.4.1 Configure iptables (IPv4)

    echo "Checking iptables configuration..."
    echo ""

    # Check if iptables is installed
    if command -v iptables &>/dev/null; then
        echo "INFO: iptables is available"
    else
        echo "INFO: iptables is not installed"
        echo "AUDIT RESULT: PASS - Not applicable (iptables not installed)"
        exit 0
    fi

    # Check default policies
    echo ""
    echo "Current iptables policies:"
    iptables -L -n | head -10

    echo ""
    echo "AUDIT RESULT: MANUAL - Review iptables configuration"
    echo "NOTE: Ubuntu 24.04 defaults to nftables"
    exit 0
  remediation_script_content: |-
    #!/bin/bash
    # CIS 4.4.1 Configure iptables (IPv4)

    echo "Applying remediation for CIS 4.4.1..."
    echo ""
    echo "WARNING: This configures basic iptables rules."
    echo "Most Ubuntu 24.04 systems should use nftables instead."
    echo ""

    # Flush existing rules
    iptables -F

    # Set default policies to DROP
    iptables -P INPUT DROP
    iptables -P FORWARD DROP
    iptables -P OUTPUT ACCEPT

    # Allow loopback
    iptables -A INPUT -i lo -j ACCEPT
    iptables -A OUTPUT -o lo -j ACCEPT
    iptables -A INPUT -s 127.0.0.0/8 -j DROP

    # Allow established connections
    iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT
    iptables -A OUTPUT -m state --state NEW,ESTABLISHED,RELATED -j ACCEPT

    # Allow SSH
    iptables -A INPUT -p tcp --dport 22 -m state --state NEW -j ACCEPT

    echo "Basic iptables rules configured"
    echo "Remediation complete for CIS 4.4.1"
  tags:
  - auditd
  - auditing
  - firewall
  - iptables
  - ipv4
  - logging
  - network
  - syslog
