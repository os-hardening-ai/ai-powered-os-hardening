- id: 1.3.1.2
  section: 1.3.1
  category: Initial Setup and Filesystem Configuration
  title: CIS Rule 1.3.1.2
  description: Bu kural /etc/default/grub dosyasinin guvenlik yapilandirmasini denetler.
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/default/grub
  audit_command: if grep "^[[:space:]]*linux" /boot/grub/grub.cfg | grep -qv "apparmor=1"; then
  remediation_command: current=$(grep '^GRUB_CMDLINE_LINUX=' "$GRUB_FILE" 2>/dev/null | sed 's/^GRUB_CMDLINE_LINUX="\(.*\)"$/\1/'
    || echo ""); new=$(echo "$new" | xargs); sed -i "s|^GRUB_CMDLINE_LINUX=.*|GRUB_CMDLINE_LINUX=\"$new\"|" "$GRUB_FILE"
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.3/1.3.1/1.3.1.2/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.3/1.3.1/1.3.1.2/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    if grep "^[[:space:]]*linux" /boot/grub/grub.cfg | grep -qv "apparmor=1"; then
        exit 1
    else
        if grep "^[[:space:]]*linux" /boot/grub/grub.cfg | grep -qv "security=apparmor"; then
            exit 1
        else
            exit 0
        fi
    fi
  remediation_script_content: "#!/bin/bash\n# CIS 1.3.1.2 Remediation - Ensure AppArmor is enabled in bootloader\n\nGRUB_FILE=\"\
    /etc/default/grub\"\n\n# Backup if not already backed up\nif [[ ! -f \"${GRUB_FILE}.original\" ]]; then\n    cp \"$GRUB_FILE\"\
    \ \"${GRUB_FILE}.original\" || {\n        echo \"ERROR: Could not backup grub config\"\n        return 1\n    }\nfi\n\n\
    current=$(grep '^GRUB_CMDLINE_LINUX=' \"$GRUB_FILE\" 2>/dev/null | sed 's/^GRUB_CMDLINE_LINUX=\"\\(.*\\)\"$/\\1/' || echo\
    \ \"\")\n\nnew=\"$current\"\nchanged=\"\"\n\nif [[ ! \"$new\" =~ (^|[[:space:]])apparmor=1([[:space:]]|$) ]]; then\n \
    \   new=\"$new apparmor=1\"\n    changed=1\nfi\n\nif [[ ! \"$new\" =~ (^|[[:space:]])security=apparmor([[:space:]]|$)\
    \ ]]; then\n    new=\"$new security=apparmor\"\n    changed=1\nfi\n\nif [[ -n \"$changed\" ]]; then\n    new=$(echo \"\
    $new\" | xargs)\n    \n    # Update existing line or add new one\n    if grep -q '^GRUB_CMDLINE_LINUX=' \"$GRUB_FILE\"\
    ; then\n        sed -i \"s|^GRUB_CMDLINE_LINUX=.*|GRUB_CMDLINE_LINUX=\\\"$new\\\"|\" \"$GRUB_FILE\"\n    else\n      \
    \  echo \"GRUB_CMDLINE_LINUX=\\\"$new\\\"\" >> \"$GRUB_FILE\"\n    fi\n    \n    # Update GRUB\n    if command -v update-grub\
    \ >/dev/null 2>&1; then\n        update-grub 2>/dev/null || true\n    elif command -v grub2-mkconfig >/dev/null 2>&1;\
    \ then\n        grub2-mkconfig -o /boot/grub2/grub.cfg 2>/dev/null || \\\n            grub2-mkconfig -o /boot/grub/grub.cfg\
    \ 2>/dev/null || true\n    fi\n    \n    echo \"SUCCESS: AppArmor bootloader parameters configured. Reboot required.\"\
    \nelse\n    echo \"ALREADY CONFIGURED: AppArmor bootloader parameters already present\"\nfi"
  tags:
  - filesystem
  - initial_setup
  - kernel_module
- id: 1.3.1.3
  section: 1.3.1
  category: Initial Setup and Filesystem Configuration
  title: Ensure all AppArmor Profiles are in enforce or complain mode
  description: 'Bu kural /etc/apparmor.d/ dosyasinin guvenlik yapilandirmasini denetler. Denetim: No profiles loaded'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/apparmor.d/
  audit_command: if ! systemctl is-active --quiet apparmor 2>/dev/null; then
  remediation_command: if ! systemctl is-active --quiet apparmor; then; systemctl start apparmor || {; systemctl enable apparmor
    >/dev/null 2>&1 || true
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.3/1.3.1/1.3.1.3/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.3/1.3.1/1.3.1.3/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS 1.3.1.3 Audit - Ensure all AppArmor Profiles are in enforce or complain mode

    # Check if apparmor_status is available
    if ! command -v apparmor_status >/dev/null 2>&1; then
        echo "ERROR: apparmor_status not found"
        exit 1
    fi

    # Check if AppArmor is running
    if ! systemctl is-active --quiet apparmor 2>/dev/null; then
        echo "ERROR: AppArmor not running"
        exit 1
    fi

    fail=0

    # Profile check
    loaded=$(apparmor_status 2>/dev/null | grep "profiles are loaded" | awk '{print $1}' || echo "0")
    if [[ "$loaded" -eq 0 ]]; then
        echo "FAIL: No profiles loaded"
        fail=1
    else
        echo "PASS: $loaded profiles loaded"
    fi

    # Unconfined check
    unconfined=$(apparmor_status 2>/dev/null | grep "processes are unconfined but have a profile defined" | awk '{print $1}' || echo "0")
    if [[ "$unconfined" -gt 0 ]]; then
        echo "FAIL: $unconfined unconfined processes"
        fail=1
    else
        echo "PASS: No unconfined processes"
    fi

    if [[ $fail -eq 0 ]]; then
        echo "AUDIT PASSED"
        exit 0
    else
        echo "AUDIT FAILED"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash
    # CIS 1.3.1.3 Remediation - Ensure AppArmor profiles are in enforce or complain mode

    # Check for root
    if [[ $EUID -ne 0 ]]; then
        echo "ERROR: Must run as root"
        return 1
    fi

    # Install utils if needed
    if ! command -v aa-enforce >/dev/null 2>&1; then
        apt-get install -y apparmor-utils >/dev/null 2>&1 || {
            echo "ERROR: Could not install apparmor-utils"
            return 1
        }
    fi

    # Start service if not running
    if ! systemctl is-active --quiet apparmor; then
        systemctl start apparmor || {
            echo "ERROR: Could not start apparmor service"
            return 1
        }
    fi

    # Enable service
    systemctl enable apparmor >/dev/null 2>&1 || true

    # Set all profiles to enforce mode
    echo "Setting profiles to enforce mode..."
    aa-enforce /etc/apparmor.d/* 2>&1 | grep -v "Warning" || true

    # Reload
    systemctl reload apparmor || true

    # Check for unconfined
    unconfined=$(apparmor_status 2>/dev/null | grep "processes are unconfined but have a profile defined" | awk '{print $1}' || echo "0")

    if [[ "$unconfined" -gt 0 ]]; then
        echo "WARNING: $unconfined unconfined processes - restart may be required"
        apparmor_status 2>/dev/null | grep -A 20 "processes are unconfined" | grep "^   " || true
    else
        echo "SUCCESS: All processes confined"
    fi

    echo "SUCCESS: Remediation completed"
