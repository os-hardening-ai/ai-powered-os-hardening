- id: 6.1.3.7
  section: 6.1.3
  category: System Maintenance
  title: Ensure rsyslog is not configured to receive logs from a remote client
  description: 'Bu kural /etc/rsyslog.conf dosyasinin guvenlik yapilandirmasini denetler. Denetim: rsyslog is configured to
    receive logs from remote clients'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/rsyslog.conf
  - /etc/rsyslog.d/
  audit_command: tcp_input=$(grep -E '^\$ModLoad imtcp|^module\(load="imtcp"\)' /etc/rsyslog.conf /etc/rsyslog.d/*.conf 2>/dev/null)
  remediation_command: sed -i 's/^\(\$ModLoad imtcp\)/#\1/' "$conf_file"; sed -i 's/^\(\$InputTCPServerRun\)/#\1/' "$conf_file";
    sed -i 's/^\(\$ModLoad imudp\)/#\1/' "$conf_file"
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.1/6.1.3/6.1.3.7/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.1/6.1.3/6.1.3.7/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # 6.1.3.7 Ensure rsyslog is not configured to receive logs from a remote client (Automated)

    echo "Checking if rsyslog is configured to receive logs from remote clients..."

    # Check for TCP reception
    tcp_input=$(grep -E '^\$ModLoad imtcp|^module\(load="imtcp"\)' /etc/rsyslog.conf /etc/rsyslog.d/*.conf 2>/dev/null)
    tcp_port=$(grep -E '^\$InputTCPServerRun|^input\(type="imtcp"' /etc/rsyslog.conf /etc/rsyslog.d/*.conf 2>/dev/null)

    # Check for UDP reception
    udp_input=$(grep -E '^\$ModLoad imudp|^module\(load="imudp"\)' /etc/rsyslog.conf /etc/rsyslog.d/*.conf 2>/dev/null)
    udp_port=$(grep -E '^\$UDPServerRun|^input\(type="imudp"' /etc/rsyslog.conf /etc/rsyslog.d/*.conf 2>/dev/null)

    if [ -z "$tcp_input" ] && [ -z "$tcp_port" ] && [ -z "$udp_input" ] && [ -z "$udp_port" ]; then
        echo "PASS: rsyslog is not configured to receive logs from remote clients"
        exit 0
    else
        echo "FAIL: rsyslog is configured to receive logs from remote clients"
        echo "TCP input module: ${tcp_input:-Not loaded}"
        echo "TCP port config: ${tcp_port:-Not configured}"
        echo "UDP input module: ${udp_input:-Not loaded}"
        echo "UDP port config: ${udp_port:-Not configured}"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # 6.1.3.7 Ensure rsyslog is not configured to receive logs from a remote client (Automated)

    echo "Removing rsyslog remote reception configuration..."

    # Comment out or remove remote reception configurations
    for conf_file in /etc/rsyslog.conf /etc/rsyslog.d/*.conf; do
        if [ -f "$conf_file" ]; then
            sed -i 's/^\(\$ModLoad imtcp\)/#\1/' "$conf_file"
            sed -i 's/^\(\$InputTCPServerRun\)/#\1/' "$conf_file"
            sed -i 's/^\(\$ModLoad imudp\)/#\1/' "$conf_file"
            sed -i 's/^\(\$UDPServerRun\)/#\1/' "$conf_file"
            sed -i 's/^\(module(load="imtcp")\)/#\1/' "$conf_file"
            sed -i 's/^\(input(type="imtcp"\)/#\1/' "$conf_file"
