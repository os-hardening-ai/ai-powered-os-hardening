- id: 6.3.2
  section: 6.3.2
  category: System Maintenance
  title: CIS Rule 6.3.2
  description: 'Bu kural /etc/cron. dosyasinin guvenlik yapilandirmasini denetler. Denetim: AIDE integrity check is not scheduled'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/cron.
  - /etc/crontab
  - /etc/cron.daily/aide
  audit_command: if crontab -l 2>/dev/null | grep -q "aide" || \
  remediation_command: chmod +x /etc/cron.daily/aide
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.3/6.3.2/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.3/6.3.2/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    echo "Checking if filesystem integrity check is scheduled..."
    if crontab -l 2>/dev/null | grep -q "aide" || \
       grep -r "aide" /etc/cron.* /etc/crontab 2>/dev/null | grep -v "^#"; then
        echo "PASS: AIDE is scheduled"
        exit 0
    else
        echo "FAIL: AIDE integrity check is not scheduled"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash
    echo "Scheduling AIDE filesystem integrity check..."
    cat > /etc/cron.daily/aide << 'CRON'
    #!/bin/bash
    /usr/bin/aide --check
    CRON
    chmod +x /etc/cron.daily/aide
    echo "AIDE has been scheduled to run daily"
  tags:
  - file_permissions
  - integrity
  - system_maintenance
- id: 6.3.3
  section: 6.3.3
  category: System Maintenance
  title: CIS Rule 6.3.3
  description: 'Bu kural /etc/aide/aide.conf dosyasinin guvenlik yapilandirmasini denetler. Denetim: Audit tools are not configured
    in AIDE'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/aide/aide.conf
  audit_command: if grep -rE "^/usr/sbin/(auditctl|auditd|ausearch|aureport|autrace|augenrules)" /etc/aide/aide.conf* 2>/dev/null;
    then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.3/6.3.3/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.3/6.3.3/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    echo "Checking cryptographic integrity for audit tools..."
    if grep -rE "^/usr/sbin/(auditctl|auditd|ausearch|aureport|autrace|augenrules)" /etc/aide/aide.conf* 2>/dev/null; then
        echo "PASS: Audit tools are protected by AIDE"
        exit 0
    else
        echo "FAIL: Audit tools are not configured in AIDE"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash
    echo "Adding audit tools to AIDE configuration..."
    cat >> /etc/aide/aide.conf << 'CONF'
    # Audit tools
    /usr/sbin/auditctl p+i+n+u+g+s+b+acl+xattrs+sha512
    /usr/sbin/auditd p+i+n+u+g+s+b+acl+xattrs+sha512
    /usr/sbin/ausearch p+i+n+u+g+s+b+acl+xattrs+sha512
    /usr/sbin/aureport p+i+n+u+g+s+b+acl+xattrs+sha512
    /usr/sbin/autrace p+i+n+u+g+s+b+acl+xattrs+sha512
    /usr/sbin/augenrules p+i+n+u+g+s+b+acl+xattrs+sha512
    CONF
    echo "Updating AIDE database..."
    aideinit
    mv /var/lib/aide/aide.db.new /var/lib/aide/aide.db
    echo "Audit tools have been added to AIDE"
  tags:
  - file_permissions
  - integrity
  - system_maintenance
- id: 7.1.1
  section: 7.1.1
  category: Security Patching and Updates
  title: Ensure permissions on /etc/passwd are configured
  description: 'Bu kural /etc/passwd dosyasinin guvenlik yapilandirmasini denetler. Denetim: /etc/passwd does not exist'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/passwd
  - /etc/passwd...
  audit_command: perm=$(stat -c "%a" /etc/passwd 2>/dev/null)
  remediation_command: chown root:root /etc/passwd; chmod u-x,go-wx /etc/passwd
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.1/7.1.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.1/7.1.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # 7.1.1 Ensure permissions on /etc/passwd are configured (Automated)

    echo "Checking permissions on /etc/passwd..."

    # Check if file exists
    if [ ! -f /etc/passwd ]; then
        echo "FAIL: /etc/passwd does not exist"
        exit 1
    fi

    # Get current permissions
    perm=$(stat -c "%a" /etc/passwd 2>/dev/null)
    owner=$(stat -c "%U" /etc/passwd 2>/dev/null)
    group=$(stat -c "%G" /etc/passwd 2>/dev/null)

    echo "Current permissions: $perm"
    echo "Owner: $owner"
    echo "Group: $group"

    # Check if permissions are 644 or more restrictive
    if [ "$perm" = "644" ] || [ "$perm" = "600" ] || [ "$perm" = "400" ]; then
        if [ "$owner" = "root" ] && [ "$group" = "root" ]; then
            echo "PASS: /etc/passwd permissions are properly configured"
            exit 0
        else
            echo "FAIL: /etc/passwd owner or group is not root"
            exit 1
        fi
    else
        echo "FAIL: /etc/passwd has incorrect permissions (expected 644 or more restrictive)"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # 7.1.1 Ensure permissions on /etc/passwd are configured (Automated)

    echo "Configuring permissions on /etc/passwd..."

    chown root:root /etc/passwd
    chmod u-x,go-wx /etc/passwd

    echo "/etc/passwd permissions have been configured"
  tags:
  - file_permissions
  - package_management
  - passwd
  - patching
  - updates
  - user_accounts
