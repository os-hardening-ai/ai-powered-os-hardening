    if [ -f /etc/issue ]; then\n    echo \"INFO: /etc/issue exists\"\n    echo \"\"\n    echo \"Current /etc/issue contents:\"\
    \n    echo \"----------------------------\"\n    cat /etc/issue\n    echo \"----------------------------\"\n    echo \"\
    \"\n    \n    # Get OS ID for checking\n    os_id=$(grep '^ID=' /etc/os-release 2>/dev/null | cut -d= -f2 | sed -e 's/\"\
    //g')\n    \n    # Check for prohibited content (OS info disclosure)\n    echo \"Checking for prohibited content...\"\n\
    \    \n    # Build the pattern\n    pattern=\"(\\\\\\\\v|\\\\\\\\r|\\\\\\\\m|\\\\\\\\s\"\n    if [ -n \"$os_id\" ]; then\n\
    \        pattern=\"${pattern}|${os_id}\"\n    fi\n    pattern=\"${pattern})\"\n    \n    if grep -E -i \"$pattern\" /etc/issue\
    \ &>/dev/null; then\n        echo \"FAIL: /etc/issue contains OS information that should be removed\"\n        echo \"\
    Found matches:\"\n        grep -E -i \"$pattern\" /etc/issue\n        audit_passed=false\n    else\n        echo \"PASS:\
    \ /etc/issue does not contain prohibited OS information\"\n    fi\nelse\n    echo \"FAIL: /etc/issue does not exist -\
    \ a warning banner should be configured\"\n    audit_passed=false\nfi\n\n# Final result\necho \"\"\nif [ \"$audit_passed\"\
    \ = true ]; then\n    echo \"AUDIT RESULT: PASS - Local login warning banner is configured properly\"\n    exit 0\nelse\n\
    \    echo \"AUDIT RESULT: FAIL - Local login warning banner is not configured properly\"\n    exit 1\nfi"
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.6.2 - Ensure local login warning banner is configured properly\n\
    # Remediation Script\n\necho \"Applying remediation for CIS 1.6.2 - Ensure local login warning banner is configured properly...\"\
    \n\nissue_file=\"/etc/issue\"\n\n# Default warning banner message\ndefault_banner=\"Authorized users only. All activity\
    \ may be monitored and reported.\"\n\n# Check if /etc/issue exists\nif [ -f \"$issue_file\" ]; then\n    echo \"Checking\
    \ $issue_file for prohibited content...\"\n    \n    # Get OS ID\n    os_id=$(grep '^ID=' /etc/os-release 2>/dev/null\
    \ | cut -d= -f2 | sed -e 's/\"//g')\n    \n    # Remove escape sequences that display OS information\n    echo \"Removing\
    \ OS information escape sequences...\"\n    \n    # Create cleaned content\n    sed -i 's/\\\\m//g; s/\\\\r//g; s/\\\\\
    s//g; s/\\\\v//g' \"$issue_file\"\n    \n    # Remove OS name references (case insensitive)\n    if [ -n \"$os_id\" ];\
    \ then\n        sed -i \"s/$os_id//gi\" \"$issue_file\"\n    fi\n    \n    echo \"Cleaned $issue_file of prohibited content\"\
    \n    \n    # Check if file is now empty or contains only whitespace\n    if [ ! -s \"$issue_file\" ] || ! grep -q '[^[:space:]]'\
    \ \"$issue_file\"; then\n        echo \"INFO: $issue_file is empty after cleanup, setting default banner\"\n        echo\
    \ \"$default_banner\" > \"$issue_file\"\n    fi\nelse\n    echo \"INFO: $issue_file does not exist, creating with default\
    \ banner\"\n    echo \"$default_banner\" > \"$issue_file\"\nfi\n\necho \"\"\necho \"Current $issue_file contents:\"\n\
    echo \"----------------------------\"\ncat \"$issue_file\"\necho \"----------------------------\"\necho \"\"\necho \"\
    Remediation complete for CIS 1.6.2 - Ensure local login warning banner is configured properly\"\necho \"\"\necho \"NOTE:\
    \ Please review /etc/issue and customize according to your site policy\""
