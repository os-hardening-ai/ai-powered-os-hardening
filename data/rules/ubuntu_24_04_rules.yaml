  title: '- Ensure system accounts do not have a valid login shell'
  description: 'Bu kural /etc/login.defs dosyasinin guvenlik yapilandirmasini denetler. Denetim: The following system accounts
    have valid login shells:'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/login.defs
  - /etc/shells
  - /etc/passwd
  audit_command: UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.7/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.7/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.7 - Ensure system accounts do not have a valid login shell
    # Check that system accounts have nologin shell

    echo "Checking system accounts for valid login shells..."

    UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)

    l_valid_shells="^($(awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\/{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"

    invalid_accounts=$(awk -v pat="$l_valid_shells" -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ && ($3<'"$UID_MIN"' || $3 == 65534) && $(NF) ~ pat) {print "Service account: \"" $1 "\" has a valid shell: " $7}' /etc/passwd)

    if [ -z "$invalid_accounts" ]; then
        echo "PASS: All system accounts have nologin shell"
        exit 0
    else
        echo "FAIL: The following system accounts have valid login shells:"
        echo "$invalid_accounts"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.7 - Ensure system accounts do not have a valid login shell
    # Set nologin shell for system accounts

    echo "Setting nologin shell for system accounts..."

    UID_MIN=$(awk '/^\s*UID_MIN/{print $2}' /etc/login.defs)
    NOLOGIN=$(command -v nologin)

    l_valid_shells="^($(awk -F\/ '$NF != "nologin" {print}' /etc/shells | sed -rn '/^\/{s,/,\\\\/,g;p}' | paste -s -d '|' - ))$"

    count=0
    awk -v pat="$l_valid_shells" -F: '($1!~/^(root|halt|sync|shutdown|nfsnobody)$/ && ($3<'"$UID_MIN"' || $3 == 65534) && $(NF) ~ pat) {print $1}' /etc/passwd | while read -r user; do
        echo "Setting nologin for: $user"
        usermod -s "$NOLOGIN" "$user"
        count=$((count + 1))
    done

    echo "SUCCESS: System accounts configured with nologin shell"
