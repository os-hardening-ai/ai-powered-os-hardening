- id: 1.7.1
  section: 1.7.1
  category: Initial Setup and Filesystem Configuration
  title: if gdm3 is installed
  description: 'Denetim: gdm3 is installed'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: gdm_status=$(dpkg-query -W -f='${db:Status-Status}' gdm3 2>/dev/null)
  remediation_command: 'apt autoremove -y || echo "WARNING: Failed to autoremove dependencies"'
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.7/1.7.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.7/1.7.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS Benchmark 1.7.1 - Ensure GDM is removed
    # Audit Script

    echo "Checking if GDM (gdm3) is installed..."

    # Check if gdm3 is installed
    gdm_status=$(dpkg-query -W -f='${db:Status-Status}' gdm3 2>/dev/null)

    if [ "$gdm_status" = "installed" ]; then
        echo "FAIL: gdm3 is installed"
        echo ""
        echo "Package status:"
        dpkg-query -W -f='${binary:Package}\t${Status}\t${db:Status-Status}\n' gdm3
        echo ""
        echo "AUDIT RESULT: FAIL - GDM (gdm3) is installed and should be removed"
        exit 1
    else
        echo "PASS: gdm3 is not installed"
        echo ""
        echo "AUDIT RESULT: PASS - GDM (gdm3) is not installed"
        exit 0
    fi
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.7.1 - Ensure GDM is removed\n# Remediation Script\n\necho \"\
    Applying remediation for CIS 1.7.1 - Ensure GDM is removed...\"\n\n# Check if gdm3 is installed\ngdm_status=$(dpkg-query\
    \ -W -f='${db:Status-Status}' gdm3 2>/dev/null)\n\nif [ \"$gdm_status\" = \"installed\" ]; then\n    echo \"gdm3 is installed,\
    \ removing...\"\n    \n    echo \"\"\n    echo \"WARNING: This will remove the GNOME Display Manager and the graphical\
    \ login interface.\"\n    echo \"         The system will no longer have a GUI login screen after this operation.\"\n\
    \    echo \"\"\n    \n    # Purge gdm3 package\n    echo \"Purging gdm3 package...\"\n    if apt purge -y gdm3; then\n\
    \        echo \"Successfully purged gdm3\"\n    else\n        echo \"ERROR: Failed to purge gdm3\"\n        return 1\n\
    \    fi\n    \n    # Remove unused dependencies\n    echo \"Removing unused dependencies...\"\n    apt autoremove -y ||\
    \ echo \"WARNING: Failed to autoremove dependencies\"\nelse\n    echo \"gdm3 is not installed, no action needed\"\nfi\n\
    \necho \"\"\necho \"Remediation complete for CIS 1.7.1 - Ensure GDM is removed\""
