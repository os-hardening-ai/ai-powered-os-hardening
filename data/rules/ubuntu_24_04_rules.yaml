  audit_command: WIRELESS_FOUND=$(find /sys/class/net/*/ -type d -name wireless 2>/dev/null)
  remediation_command: 'modprobe -r "$module" 2>/dev/null && echo "Unloaded module: $module"; "install brcmfmac /bin/true"
    > /etc/modprobe.d/disable-wireless.conf'
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S3/3.1/3.1.2/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S3/3.1/3.1.2/remediation.sh
  audit_script_content: "#!/bin/bash\n# CIS 3.1.2 Ensure wireless interfaces are disabled\n\necho \"Checking wireless interface\
    \ status...\"\n\nFAIL=0\n\n# Check if any wireless interfaces exist\nWIRELESS_FOUND=$(find /sys/class/net/*/ -type d -name\
    \ wireless 2>/dev/null)\n\nif [ -n \"$WIRELESS_FOUND\" ]; then\n    echo \"WARNING: Wireless interfaces found:\"\n   \
    \ echo \"$WIRELESS_FOUND\"\n    \n    # Check if wireless is blocked via rfkill\n    if command -v rfkill &>/dev/null;\
    \ then\n        if rfkill list wifi 2>/dev/null | grep -q \"Soft blocked: yes\"; then\n            echo \"INFO: Wireless\
    \ is soft blocked via rfkill\"\n        elif rfkill list wifi 2>/dev/null | grep -q \"Hard blocked: yes\"; then\n    \
    \        echo \"INFO: Wireless is hard blocked\"\n        else\n            echo \"FAIL: Wireless interfaces exist and\
    \ are not blocked\"\n            FAIL=1\n        fi\n    else\n        echo \"FAIL: Wireless interfaces exist and rfkill\
    \ is not available\"\n        FAIL=1\n    fi\nelse\n    echo \"PASS: No wireless interfaces found\"\nfi\n\n# Check if\
    \ any wireless modules are loaded\nWIRELESS_MODULES=$(lsmod | grep -E \"^(cfg80211|mac80211|iwlwifi|ath|rtl|brcm)\" 2>/dev/null)\n\
    if [ -n \"$WIRELESS_MODULES\" ]; then\n    echo \"WARNING: Wireless kernel modules loaded:\"\n    echo \"$WIRELESS_MODULES\"\
    \nfi\n\nif [ \"$FAIL\" -eq 0 ]; then\n    echo \"\"\n    echo \"AUDIT RESULT: PASS\"\n    exit 0\nelse\n    echo \"\"\n\
    \    echo \"AUDIT RESULT: FAIL\"\n    exit 1\nfi"
  remediation_script_content: |-
    #!/bin/bash
    # CIS 3.1.2 Ensure wireless interfaces are disabled

    echo "Applying remediation for CIS 3.1.2..."

    # Block wireless using rfkill if available
    if command -v rfkill &>/dev/null; then
        rfkill block wifi 2>/dev/null
        rfkill block bluetooth 2>/dev/null
        echo "Blocked wifi and bluetooth via rfkill"
    else
        echo "rfkill not available"
    fi

    # Disable common wireless modules
    WIRELESS_MODULES="iwlwifi ath9k ath10k_pci rtl8xxxu brcmfmac"

    for module in $WIRELESS_MODULES; do
        if lsmod | grep -q "^$module"; then
            modprobe -r "$module" 2>/dev/null && echo "Unloaded module: $module"
        fi
    done

    # Create blacklist file to prevent loading at boot
    printf '%s\n' \
        "# CIS 3.1.2 - Disable wireless modules" \
        "install iwlwifi /bin/true" \
        "install ath9k /bin/true" \
        "install ath10k_pci /bin/true" \
        "install rtl8xxxu /bin/true" \
        "install brcmfmac /bin/true" > /etc/modprobe.d/disable-wireless.conf

    echo "Created /etc/modprobe.d/disable-wireless.conf"
    echo ""
    echo "Remediation complete for CIS 3.1.2"
    echo "NOTE: A reboot may be required for full effect"
  tags:
  - firewall
  - ipv4
  - ipv6
  - network
