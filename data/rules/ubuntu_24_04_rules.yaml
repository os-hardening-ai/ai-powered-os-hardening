- id: 5.4.2.4
  section: 5.4.2
  category: Access Authentication and Authorization
  title: '- Ensure root account access is controlled'
  description: 'Denetim: Root account is not properly secured (status: $root_status)'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: root_status=$(passwd -S root | awk '{print $2}')
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.4/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.4/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.4 - Ensure root account access is controlled
    # Verify root account has password set or is locked

    echo "Checking root account access control..."

    root_status=$(passwd -S root | awk '{print $2}')

    case "$root_status" in
        P)
            echo "PASS: Root account has a password set (status: P)"
            exit 0
            ;;
        L)
            echo "PASS: Root account is locked (status: L)"
            exit 0
            ;;
        *)
            echo "FAIL: Root account is not properly secured (status: $root_status)"
            echo "Expected: P (password set) or L (locked)"
            exit 1
            ;;
    esac
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.4 - Ensure root account access is controlled
    # Set password for root or lock the account

    echo "Checking root account status..."

    root_status=$(passwd -S root | awk '{print $2}')

    case "$root_status" in
        P)
            echo "Root account already has a password set"
            return 0
            ;;
        L)
            echo "Root account is already locked"
            return 0
            ;;
        *)
            echo "Root account is not secured (status: $root_status)"
            echo ""
            echo "Choose an option:"
            echo "  1. Lock root account: usermod -L root"
            echo "  2. Set root password: passwd root"
            echo ""
            echo "Locking root account..."
            usermod -L root
            echo "SUCCESS: Root account has been locked"
            ;;
    esac
