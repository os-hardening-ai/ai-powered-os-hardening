- id: 5.4.2.5
  section: 5.4.2
  category: Access Authentication and Authorization
  title: '- Ensure root path integrity'
  description: 'Denetim: Root''s path has the following issues:'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: grep -q "::" <<< "$l_root_path" && l_output2="$l_output2\n - root's path contains an empty directory (::)"
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.5/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.5/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.5 - Ensure root path integrity
    # Audit root's PATH for security issues

    echo "Checking root's PATH integrity..."

    l_output2=""
    l_pmask="0022"
    l_maxperm="$( printf '%o' $(( 0777 & ~$l_pmask )) )"
    l_root_path="$(sudo -Hiu root env | grep '^PATH' | cut -d= -f2)"

    # Parse PATH
    unset a_path_loc && IFS=":" read -ra a_path_loc <<< "$l_root_path"

    # Check for empty directory (::)
    grep -q "::" <<< "$l_root_path" && l_output2="$l_output2\n - root's path contains an empty directory (::)"

    # Check for trailing colon (:)
    grep -Pq ":\h*$" <<< "$l_root_path" && l_output2="$l_output2\n - root's path contains a trailing (:)"

    # Check for current working directory (.)
    grep -Pq '(\h+|:)\.(:|\h*$)' <<< "$l_root_path" && l_output2="$l_output2\n - root's path contains current working directory (.)"

    # Check each path component
    while read -r l_path; do
        if [ -d "$l_path" ]; then
            while read -r l_fmode l_fown; do
                [ "$l_fown" != "root" ] && l_output2="$l_output2\n - Directory: \"$l_path\" is owned by: \"$l_fown\" should be owned by \"root\""
                [ $(( $l_fmode & $l_pmask )) -gt 0 ] && l_output2="$l_output2\n - Directory: \"$l_path\" is mode: \"$l_fmode\" and should be mode: \"$l_maxperm\" or more restrictive"
            done <<< "$(stat -Lc '%#a %U' "$l_path")"
        else
            l_output2="$l_output2\n - \"$l_path\" is not a directory"
        fi
    done <<< "$(printf "%s\n" "${a_path_loc[@]}")"

    if [ -z "$l_output2" ]; then
        echo "PASS: Root's path is correctly configured"
        exit 0
    else
        echo "FAIL: Root's path has the following issues:"
        echo -e "$l_output2"
        exit 1
    fi
  remediation_script_content: "#!/bin/bash\n\n# CIS 5.4.2.5 - Ensure root path integrity\n# Manual remediation script - identifies\
    \ issues for correction\n\necho \"Checking root's PATH for security issues...\"\n\nl_pmask=\"0022\"\nl_maxperm=\"$( printf\
    \ '%o' $(( 0777 & ~$l_pmask )) )\"\nl_root_path=\"$(sudo -Hiu root env | grep '^PATH' | cut -d= -f2)\"\n\necho \"Current\
    \ root PATH: $l_root_path\"\necho \"\"\n\nissues_found=0\n\n# Check for empty directory (::)\nif grep -q \"::\" <<< \"\
    $l_root_path\"; then\n    echo \"ISSUE: PATH contains empty directory (::)\"\n    echo \"  ACTION: Remove empty entries\
    \ from PATH in root's shell configuration\"\n    issues_found=1\nfi\n\n# Check for trailing colon (:)\nif grep -Pq \"\
    :\\h*$\" <<< \"$l_root_path\"; then\n    echo \"ISSUE: PATH contains trailing colon (:)\"\n    echo \"  ACTION: Remove\
    \ trailing colon from PATH\"\n    issues_found=1\nfi\n\n# Check for current working directory (.)\nif grep -Pq '(\\h+|:)\\\
    .(:|\\h*$)' <<< \"$l_root_path\"; then\n    echo \"ISSUE: PATH contains current working directory (.)\"\n    echo \" \
    \ ACTION: Remove . from PATH\"\n    issues_found=1\nfi\n\n# Check each path component\nunset a_path_loc && IFS=\":\" read\
    \ -ra a_path_loc <<< \"$l_root_path\"\nfor l_path in \"${a_path_loc[@]}\"; do\n    if [ -d \"$l_path\" ]; then\n     \
    \   l_fown=$(stat -Lc '%U' \"$l_path\")\n        l_fmode=$(stat -Lc '%#a' \"$l_path\")\n        \n        if [ \"$l_fown\"\
    \ != \"root\" ]; then\n            echo \"ISSUE: Directory \\\"$l_path\\\" is owned by \\\"$l_fown\\\"\"\n           \
    \ echo \"  ACTION: chown root \\\"$l_path\\\"\"\n            issues_found=1\n        fi\n        \n        if [ $(( $l_fmode\
    \ & $l_pmask )) -gt 0 ]; then\n            echo \"ISSUE: Directory \\\"$l_path\\\" has mode $l_fmode (should be $l_maxperm\
    \ or more restrictive)\"\n            echo \"  ACTION: chmod $l_maxperm \\\"$l_path\\\"\"\n            issues_found=1\n\
    \        fi\n    else\n        echo \"ISSUE: \\\"$l_path\\\" is not a directory\"\n        echo \"  ACTION: Remove from\
    \ PATH or create the directory\"\n        issues_found=1\n    fi\ndone\n\nif [ $issues_found -eq 0 ]; then\n    echo \"\
    SUCCESS: Root PATH is correctly configured\"\nelse\n    echo \"\"\n    echo \"Manual intervention required to fix the\
    \ above issues\"\n    return 1\nfi"
