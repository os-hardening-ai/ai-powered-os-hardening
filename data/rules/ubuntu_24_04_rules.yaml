- id: 5.4.1.6
  section: 5.4.1
  category: Access Authentication and Authorization
  title: '- Ensure all users last password change date is in the past'
  description: 'Bu kural /etc/shadow dosyasinin guvenlik yapilandirmasini denetler. Denetim: The following users have password
    change dates in the future:'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/shadow
  audit_command: 'l_change=$(date -d "$(chage --list $l_user | grep ''^Last password change'' | cut -d: -f2 | grep -v ''never$'')"
    +%s 2>/dev/null)'
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.1/5.4.1.6/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.1/5.4.1.6/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # CIS 5.4.1.6 - Ensure all users last password change date is in the past
    # Check that no user has a password change date in the future

    echo "Checking users' last password change dates..."

    l_output=""
    while IFS= read -r l_user; do
        l_change=$(date -d "$(chage --list $l_user | grep '^Last password change' | cut -d: -f2 | grep -v 'never$')" +%s 2>/dev/null)
        if [[ "$l_change" -gt "$(date +%s)" ]]; then
            l_output="$l_output\nUser: \"$l_user\" last password change was \"$(chage --list $l_user | grep '^Last password change' | cut -d: -f2)\""
        fi
    done < <(awk -F: '$2~/^\$.+\$/{print $1}' /etc/shadow)

    if [ -n "$l_output" ]; then
        echo "FAIL: The following users have password change dates in the future:"
        echo -e "$l_output"
        exit 1
    fi

    echo "PASS: All users' last password change dates are in the past"
    exit 0
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.1.6 - Ensure all users last password change date is in the past
    # Manual remediation required - investigate and correct users

    echo "Checking for users with future password change dates..."

    l_output=""
    while IFS= read -r l_user; do
        l_change=$(date -d "$(chage --list $l_user | grep '^Last password change' | cut -d: -f2 | grep -v 'never$')" +%s 2>/dev/null)
        if [[ "$l_change" -gt "$(date +%s)" ]]; then
            l_output="$l_output $l_user"
            echo "Found user with future date: $l_user"
            # Set the password change date to today
            chage -d "$(date +%Y-%m-%d)" "$l_user"
            echo "  - Set last password change to today for $l_user"
        fi
    done < <(awk -F: '$2~/^\$.+\$/{print $1}' /etc/shadow)

    if [ -z "$l_output" ]; then
        echo "No users found with future password change dates"
    else
        echo ""
        echo "Remediated users:$l_output"
    fi

    echo "SUCCESS: Password change dates verified"
  tags:
  - access_control
  - authentication
  - authorization
  - password
- id: 5.4.2.1
  section: 5.4.2
  category: Access Authentication and Authorization
  title: '- Ensure root is the only UID 0 account'
  description: 'Bu kural /etc/passwd dosyasinin guvenlik yapilandirmasini denetler. Denetim: The following accounts have UID
    0:'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/passwd
  audit_command: 'uid0_accounts=$(awk -F: ''($3 == 0) { print $1 }'' /etc/passwd)'
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.1 - Ensure root is the only UID 0 account
    # Verify only root has UID 0

    echo "Checking for accounts with UID 0..."

    uid0_accounts=$(awk -F: '($3 == 0) { print $1 }' /etc/passwd)
    uid0_count=$(echo "$uid0_accounts" | wc -l)

    if [ "$uid0_accounts" = "root" ] && [ "$uid0_count" -eq 1 ]; then
        echo "PASS: Only root has UID 0"
        exit 0
    else
        echo "FAIL: The following accounts have UID 0:"
        echo "$uid0_accounts"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.1 - Ensure root is the only UID 0 account
    # Manual remediation - change UID for non-root accounts with UID 0

    echo "Checking for non-root accounts with UID 0..."

    non_root_uid0=$(awk -F: '($3 == 0 && $1 != "root") { print $1 }' /etc/passwd)

    if [ -z "$non_root_uid0" ]; then
        echo "No non-root accounts with UID 0 found"
        echo "SUCCESS: Only root has UID 0"
        return 0
    fi

    echo "WARNING: The following non-root accounts have UID 0:"
    echo "$non_root_uid0"
    echo ""
    echo "Manual action required:"
    echo "For each account listed above, run:"
    echo "  usermod -u <new_uid> <username>"
    echo ""
    echo "Example: usermod -u 1001 baduser"
    return 1
