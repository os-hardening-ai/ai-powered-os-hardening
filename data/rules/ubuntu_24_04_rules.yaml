  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.3/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.3/remediation.sh
  audit_script_content: "#!/bin/bash\n# CIS Benchmark 1.5.3 - Ensure core dumps are restricted\n# Audit Script\n\naudit_passed=true\n\
    \n# Check 1: Verify hard core limit is set to 0\necho \"Checking hard core limit...\"\nif grep -Pqs -- '^\\h*\\*\\h+hard\\\
    h+core\\h+0\\b' /etc/security/limits.conf /etc/security/limits.d/* 2>/dev/null; then\n    echo \"PASS: Hard core limit\
    \ is set to 0\"\nelse\n    echo \"FAIL: Hard core limit is not set to 0\"\n    audit_passed=false\nfi\n\n# Check 2: Verify\
    \ fs.suid_dumpable is set to 0 in running configuration\necho \"Checking fs.suid_dumpable in running configuration...\"\
    \nrunning_value=$(sysctl -n fs.suid_dumpable 2>/dev/null)\nif [ \"$running_value\" = \"0\" ]; then\n    echo \"PASS: fs.suid_dumpable\
    \ is correctly set to 0 in running configuration\"\nelse\n    echo \"FAIL: fs.suid_dumpable is set to '$running_value'\
    \ in running configuration (should be 0)\"\n    audit_passed=false\nfi\n\n# Check 3: Verify fs.suid_dumpable is set in\
    \ durable configuration\necho \"Checking fs.suid_dumpable in durable configuration...\"\ndurable_set=false\nfor file in\
    \ /etc/sysctl.conf /etc/sysctl.d/*.conf; do\n    if [ -f \"$file\" ]; then\n        if grep -Pqs -- '^\\h*fs\\.suid_dumpable\\\
    h*=\\h*0\\b' \"$file\"; then\n            echo \"PASS: fs.suid_dumpable=0 is set in $file\"\n            durable_set=true\n\
    \            break\n        fi\n    fi\ndone\n\nif [ \"$durable_set\" = false ]; then\n    echo \"FAIL: fs.suid_dumpable=0\
    \ is not set in any sysctl configuration file\"\n    audit_passed=false\nfi\n\n# Check 4: If systemd-coredump is installed,\
    \ verify its configuration\necho \"Checking systemd-coredump configuration...\"\nif systemctl list-unit-files 2>/dev/null\
    \ | grep -q coredump; then\n    echo \"INFO: systemd-coredump is installed, checking configuration...\"\n    \n    storage_ok=false\n\
    \    processsize_ok=false\n    storage_file=\"\"\n    processsize_file=\"\"\n    \n    # Check /etc/systemd/coredump.conf\
    \ and /etc/systemd/coredump.conf.d/*.conf\n    config_files=\"/etc/systemd/coredump.conf\"\n    if [ -d \"/etc/systemd/coredump.conf.d\"\
    \ ]; then\n        config_files=\"$config_files $(find /etc/systemd/coredump.conf.d -name '*.conf' 2>/dev/null | tr '\\\
    n' ' ')\"\n    fi\n    \n    for conf_file in $config_files; do\n        if [ -f \"$conf_file\" ]; then\n            if\
    \ grep -Pqs -- '^\\h*Storage\\h*=\\h*none\\b' \"$conf_file\"; then\n                storage_ok=true\n                storage_file=\"\
    $conf_file\"\n            fi\n            \n            if grep -Pqs -- '^\\h*ProcessSizeMax\\h*=\\h*0\\b' \"$conf_file\"\
    ; then\n                processsize_ok=true\n                processsize_file=\"$conf_file\"\n            fi\n       \
    \ fi\n    done\n    \n    if [ \"$storage_ok\" = true ] && [ \"$processsize_ok\" = true ]; then\n        echo \"PASS:\
    \ systemd-coredump is correctly configured\"\n        echo \"  - Storage=none found in $storage_file\"\n        echo \"\
    \  - ProcessSizeMax=0 found in $processsize_file\"\n    else\n        if [ \"$storage_ok\" = false ]; then\n         \
    \   echo \"FAIL: Storage=none is not set in any coredump configuration file\"\n            audit_passed=false\n      \
    \  fi\n        if [ \"$processsize_ok\" = false ]; then\n            echo \"FAIL: ProcessSizeMax=0 is not set in any coredump\
    \ configuration file\"\n            audit_passed=false\n        fi\n    fi\nelse\n    echo \"INFO: systemd-coredump is\
    \ not installed (no additional configuration needed)\"\nfi\n\n# Final result\necho \"\"\nif [ \"$audit_passed\" = true\
    \ ]; then\n    echo \"AUDIT RESULT: PASS - Core dumps are properly restricted\"\n    exit 0\nelse\n    echo \"AUDIT RESULT:\
    \ FAIL - Core dumps are not properly restricted\"\n    exit 1\nfi"
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.5.3 - Ensure core dumps are restricted\n# Remediation Script\n\
    \necho \"Applying remediation for CIS 1.5.3 - Ensure core dumps are restricted...\"\n\n# Remediation 1: Set hard core\
    \ limit to 0\necho \"Setting hard core limit to 0...\"\nlimits_file=\"/etc/security/limits.d/99-core-dumps.conf\"\n\n\
    # Check if already set in limits.conf or limits.d\nif ! grep -Pqs -- '^\\h*\\*\\h+hard\\h+core\\h+0\\b' /etc/security/limits.conf\
    \ /etc/security/limits.d/* 2>/dev/null; then\n    echo \"* hard core 0\" > \"$limits_file\"\n    echo \"Created $limits_file\
    \ with hard core limit set to 0\"\nelse\n    echo \"Hard core limit is already set to 0\"\nfi\n\n# Remediation 2: Set\
    \ fs.suid_dumpable to 0 in durable configuration\necho \"Setting fs.suid_dumpable=0 in sysctl configuration...\"\nsysctl_file=\"\
    /etc/sysctl.d/60-fs_sysctl.conf\"\n\n# Check if already set correctly\nif ! grep -Pqs -- '^\\h*fs\\.suid_dumpable\\h*=\\\
    h*0\\b' /etc/sysctl.conf /etc/sysctl.d/*.conf 2>/dev/null; then\n    # Create or append to sysctl file\n    if [ -f \"\
    $sysctl_file\" ]; then\n        # Remove any existing fs.suid_dumpable entries to avoid conflicts\n        sed -i '/^\\\
    s*fs\\.suid_dumpable/d' \"$sysctl_file\"\n    fi\n    echo \"fs.suid_dumpable = 0\" >> \"$sysctl_file\"\n    echo \"Added\
    \ fs.suid_dumpable=0 to $sysctl_file\"\nelse\n    echo \"fs.suid_dumpable=0 is already set in durable configuration\"\n\
    fi\n\n# Remediation 3: Apply kernel parameter immediately\necho \"Applying fs.suid_dumpable=0 to running configuration...\"\
    \nif sysctl -w fs.suid_dumpable=0 > /dev/null 2>&1; then\n    echo \"Successfully set fs.suid_dumpable=0 in running configuration\"\
    \nelse\n    echo \"WARNING: Failed to set fs.suid_dumpable=0 in running configuration\"\nfi\n\n# Remediation 4: Configure\
    \ systemd-coredump if installed\nif systemctl list-unit-files 2>/dev/null | grep -q coredump; then\n    echo \"systemd-coredump\
    \ is installed, applying additional configuration...\"\n    \n    coredump_conf=\"/etc/systemd/coredump.conf\"\n    coredump_dir=\"\
    /etc/systemd/coredump.conf.d\"\n    \n    # Create coredump.conf.d directory if it doesn't exist\n    if [ ! -d \"$coredump_dir\"\
    \ ]; then\n        mkdir -p \"$coredump_dir\"\n    fi\n    \n    # Create override configuration\n    override_file=\"\
    $coredump_dir/99-disable-coredump.conf\"\n    printf '%s\\n' \\\n        \"[Coredump]\" \\\n        \"Storage=none\" \\\
    \n        \"ProcessSizeMax=0\" > \"$override_file\"\n    echo \"Created $override_file with Storage=none and ProcessSizeMax=0\"\
    \n    \n    # Reload systemd daemon\n    if systemctl daemon-reload; then\n        echo \"Successfully reloaded systemd\
    \ daemon\"\n    else\n        echo \"WARNING: Failed to reload systemd daemon\"\n    fi\nelse\n    echo \"systemd-coredump\
    \ is not installed, skipping additional configuration\"\nfi\n\necho \"\"\necho \"Remediation complete for CIS 1.5.3 -\
    \ Ensure core dumps are restricted\"\necho \"Note: A system reboot may be required for all changes to take full effect\""
