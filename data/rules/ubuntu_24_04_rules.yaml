  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.3/5.4.3.3/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.3/5.4.3.3/remediation.sh
  audit_script_content: "#!/bin/bash\n\n# CIS 5.4.3.3 - Ensure default user umask is configured\n# Check umask is set to 027\
    \ or more restrictive\n\necho \"Checking default user umask configuration...\"\n\nl_output=\"\" \nl_output2=\"\"\n\nfile_umask_chk()\
    \ {\n    if grep -Psiq -- '^\\h*umask\\h+(0?[0-7][2-7]7|u(=[rwx]{0,3}),g=([rx]{0,2}),o=)(\\h*#.*)?$' \"$l_file\"; then\n\
    \        l_output=\"$l_output\\n - umask is set correctly in \\\"$l_file\\\"\"\n    elif grep -Psiq -- '^\\h*umask\\h+(([0-7][0-7][01][0-7]\\\
    b|[0-7][0-7][0-7][0-6]\\b)|([0-7][01][0-7]\\b|[0-7][0-7][0-6]\\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\\b)(,o=[rwx]{1,3})?)|((g=[wrx]{1,3},)?o=[wrx]{1,3}\\\
    b)))' \"$l_file\"; then\n        l_output2=\"$l_output2\\n - umask is incorrectly set in \\\"$l_file\\\"\"\n    fi\n}\n\
    \n# Check /etc/profile.d/*.sh files\nwhile IFS= read -r -d $'\\0' l_file; do\n    file_umask_chk\ndone < <(find /etc/profile.d/\
    \ -type f -name '*.sh' -print0 2>/dev/null)\n\n# Check other files in order\n[ -z \"$l_output\" ] && l_file=\"/etc/profile\"\
    \ && [ -f \"$l_file\" ] && file_umask_chk\n[ -z \"$l_output\" ] && l_file=\"/etc/bashrc\" && [ -f \"$l_file\" ] && file_umask_chk\n\
    [ -z \"$l_output\" ] && l_file=\"/etc/bash.bashrc\" && [ -f \"$l_file\" ] && file_umask_chk\n[ -z \"$l_output\" ] && l_file=\"\
    /etc/login.defs\" && [ -f \"$l_file\" ] && file_umask_chk\n[ -z \"$l_output\" ] && l_file=\"/etc/default/login\" && [\
    \ -f \"$l_file\" ] && file_umask_chk\n\n[[ -z \"$l_output\" && -z \"$l_output2\" ]] && l_output2=\"$l_output2\\n - umask\
    \ is not set\"\n\nif [ -z \"$l_output2\" ]; then\n    echo \"PASS: Default user umask is correctly configured\"\n    echo\
    \ -e \"$l_output\"\n    exit 0\nelse\n    echo \"FAIL: Default user umask has issues:\"\n    echo -e \"$l_output2\"\n\
    \    [ -n \"$l_output\" ] && echo -e \"\\nCorrectly configured:$l_output\"\n    exit 1\nfi"
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.3.3 - Ensure default user umask is configured
    # Set default umask to 027

    echo "Configuring default user umask to 027..."

    l_output2=""

    # Check for incorrectly configured umask
    file_umask_chk() {
        if grep -Psiq -- '^\h*umask\h+(([0-7][0-7][01][0-7]\b|[0-7][0-7][0-7][0-6]\b)|([0-7][01][0-7]\b|[0-7][0-7][0-6]\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\b)(,o=[rwx]{1,3})?)|((g=[wrx]{1,3},)?o=[wrx]{1,3}\b)))' "$l_file"; then
            l_output2="$l_output2\n   - \"$l_file\""
        fi
    }

    # Check files for incorrect umask
    while IFS= read -r -d $'\0' l_file; do
        file_umask_chk
    done < <(find /etc/profile.d/ -type f -name '*.sh' -print0 2>/dev/null)

    l_file="/etc/profile" && [ -f "$l_file" ] && file_umask_chk
    l_file="/etc/bashrc" && [ -f "$l_file" ] && file_umask_chk
    l_file="/etc/bash.bashrc" && [ -f "$l_file" ] && file_umask_chk
    l_file="/etc/login.defs" && [ -f "$l_file" ] && file_umask_chk
    l_file="/etc/default/login" && [ -f "$l_file" ] && file_umask_chk

    if [ -n "$l_output2" ]; then
        echo "WARNING: UMASK is not restrictive enough in the following files:"
        echo -e "$l_output2"
        echo ""
        echo "Please update these files and set umask to 0027 or more restrictive"
    fi

    # Create umask configuration
    printf '%s\n' \
        "# CIS 5.4.3.3 - Default user umask" \
        "umask 027" > /etc/profile.d/50-systemwide_umask.sh

    echo "SUCCESS: Created /etc/profile.d/50-systemwide_umask.sh with umask 027"
  tags:
  - access_control
  - authentication
  - authorization
  - file_permissions
  - umask
