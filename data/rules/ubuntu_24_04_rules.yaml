- id: 2.3.1
  section: 2.3.1
  category: Software and Service Configuration
  title: if systemd-timesyncd is enabled
  description: 'Denetim: No time synchronization service is enabled'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: timesyncd_status=$(systemctl is-enabled systemd-timesyncd.service 2>/dev/null)
  remediation_command: timesyncd_status=$(systemctl is-enabled systemd-timesyncd.service 2>/dev/null); chrony_status=$(systemctl
    is-enabled chrony.service 2>/dev/null); systemctl unmask systemd-timesyncd.service 2>/dev/null
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.3/2.3.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.3/2.3.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS Benchmark 2.3.1 - Ensure time synchronization is in use
    audit_passed=false
    echo "Checking time synchronization..."

    # Check if systemd-timesyncd is enabled
    timesyncd_status=$(systemctl is-enabled systemd-timesyncd.service 2>/dev/null)
    if [ "$timesyncd_status" = "enabled" ]; then
        echo "PASS: systemd-timesyncd.service is enabled"
        audit_passed=true
    fi

    # Check if chrony is enabled
    chrony_status=$(systemctl is-enabled chrony.service 2>/dev/null)
    if [ "$chrony_status" = "enabled" ]; then
        echo "PASS: chrony.service is enabled"
        audit_passed=true
    fi

    # Check if ntp is enabled
    ntp_status=$(systemctl is-enabled ntp.service 2>/dev/null)
    if [ "$ntp_status" = "enabled" ]; then
        echo "PASS: ntp.service is enabled"
        audit_passed=true
    fi

    if [ "$audit_passed" = false ]; then
        echo "FAIL: No time synchronization service is enabled"
    fi

    echo ""
    [ "$audit_passed" = true ] && echo "AUDIT RESULT: PASS" && exit 0 || echo "AUDIT RESULT: FAIL" && exit 1
  remediation_script_content: |-
    #!/bin/bash
    # CIS Benchmark 2.3.1 - Ensure time synchronization is in use
    echo "Applying remediation for CIS 2.3.1..."

    # Check if any time sync service is already enabled
    timesyncd_status=$(systemctl is-enabled systemd-timesyncd.service 2>/dev/null)
    chrony_status=$(systemctl is-enabled chrony.service 2>/dev/null)

    if [ "$timesyncd_status" = "enabled" ] || [ "$chrony_status" = "enabled" ]; then
        echo "Time synchronization is already enabled"
    else
        # Enable systemd-timesyncd by default
        echo "Enabling systemd-timesyncd..."
        systemctl unmask systemd-timesyncd.service 2>/dev/null
        systemctl enable --now systemd-timesyncd.service
        echo "systemd-timesyncd.service enabled and started"
    fi

    echo "Remediation complete for CIS 2.3.1"
  tags:
  - daemon
  - ntp
  - services
  - software
  - time_sync
- id: 2.3.2
  section: 2.3.2
  category: Software and Service Configuration
  title: if systemd-timesyncd is in use
  description: Bu kural /etc/systemd/timesyncd.conf dosyasinin guvenlik yapilandirmasini denetler.
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/systemd/timesyncd.conf
  - /etc/systemd/timesyncd.conf.d
  audit_command: timesyncd_status=$(systemctl is-enabled systemd-timesyncd.service 2>/dev/null)
  remediation_command: if systemctl is-enabled systemd-timesyncd.service 2>/dev/null | grep -q "enabled"; then; systemctl
    restart systemd-timesyncd.service
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.3/2.3.2/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.3/2.3.2/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS Benchmark 2.3.2 - Ensure systemd-timesyncd configured with authorized timeserver
    audit_passed=true
    echo "Checking systemd-timesyncd configuration..."

    # Check if systemd-timesyncd is in use
    timesyncd_status=$(systemctl is-enabled systemd-timesyncd.service 2>/dev/null)
    if [ "$timesyncd_status" != "enabled" ]; then
        echo "INFO: systemd-timesyncd is not enabled, skipping check"
        echo "AUDIT RESULT: PASS - Not applicable"
        exit 0
    fi

    # Check if NTP servers are configured
    config_file="/etc/systemd/timesyncd.conf"
    drop_in_dir="/etc/systemd/timesyncd.conf.d"

    ntp_configured=false

    # Check main config
    if [ -f "$config_file" ]; then
        if grep -Pq '^\s*NTP\s*=' "$config_file"; then
            echo "PASS: NTP servers configured in $config_file"
            grep -P '^\s*NTP\s*=' "$config_file"
            ntp_configured=true
        fi
    fi

    # Check drop-in files
    if [ -d "$drop_in_dir" ]; then
        for f in "$drop_in_dir"/*.conf; do
            [ -f "$f" ] || continue
            if grep -Pq '^\s*NTP\s*=' "$f"; then
                echo "PASS: NTP servers configured in $f"
                ntp_configured=true
            fi
        done
    fi

    if [ "$ntp_configured" = false ]; then
        echo "WARNING: No explicit NTP servers configured (using defaults)"
        echo "         Consider configuring authorized NTP servers"
    fi

    # Show current time sync status
    echo ""
    echo "Current time synchronization status:"
    timedatectl show --property=NTP --property=NTPSynchronized 2>/dev/null

    echo ""
    echo "AUDIT RESULT: PASS - Review NTP configuration manually"
    exit 0
  remediation_script_content: |-
    #!/bin/bash
    # CIS Benchmark 2.3.2 - Ensure systemd-timesyncd configured with authorized timeserver
    echo "Applying remediation for CIS 2.3.2..."

    # Configuration
    NTP_SERVERS="time.nist.gov pool.ntp.org"
    FALLBACK_NTP="time.google.com"

    config_file="/etc/systemd/timesyncd.conf"

    # Backup original config
    if [ -f "$config_file" ]; then
        cp "$config_file" "${config_file}.bak"
    fi

    # Create configuration
    printf '%s\n' \
        "[Time]" \
        "NTP=$NTP_SERVERS" \
        "FallbackNTP=$FALLBACK_NTP" > "$config_file"

    echo "Configured NTP servers:"
    cat "$config_file"

    # Restart service if enabled
    if systemctl is-enabled systemd-timesyncd.service 2>/dev/null | grep -q "enabled"; then
        echo "Restarting systemd-timesyncd..."
        systemctl restart systemd-timesyncd.service
    fi

    echo ""
    echo "Remediation complete for CIS 2.3.2"
  tags:
  - daemon
  - ntp
  - services
  - software
  - time_sync
- id: 2.3.3
  section: 2.3.3
  category: Software and Service Configuration
  title: if chrony is in use
  description: 'Bu kural /etc/chrony/chrony.conf dosyasinin guvenlik yapilandirmasini denetler. Denetim: No NTP servers configured
    for chrony'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/chrony/chrony.conf
  - /etc/chrony/conf.d/
  audit_command: chrony_status=$(systemctl is-enabled chrony.service 2>/dev/null)
  remediation_command: if systemctl is-enabled chrony.service 2>/dev/null | grep -q "enabled"; then; systemctl restart chrony.service
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.3/2.3.3/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.3/2.3.3/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS Benchmark 2.3.3 - Ensure chrony is configured with authorized timeserver
    audit_passed=true
    echo "Checking chrony configuration..."

    # Check if chrony is in use
    chrony_status=$(systemctl is-enabled chrony.service 2>/dev/null)
    if [ "$chrony_status" != "enabled" ]; then
        echo "INFO: chrony is not enabled, skipping check"
        echo "AUDIT RESULT: PASS - Not applicable"
        exit 0
    fi

    # Check if NTP servers are configured
    config_files="/etc/chrony/chrony.conf /etc/chrony/conf.d/*.conf"
    ntp_configured=false

    for config_file in $config_files; do
        [ -f "$config_file" ] || continue
        if grep -Eq "^(server|pool)" "$config_file" 2>/dev/null; then
            echo "PASS: NTP servers configured in $config_file"
            grep -E "^(server|pool)" "$config_file"
            ntp_configured=true
        fi
    done

    if [ "$ntp_configured" = false ]; then
        echo "FAIL: No NTP servers configured for chrony"
        audit_passed=false
    fi

    # Show synchronization status
    echo ""
    echo "Chrony sources:"
    chronyc sources 2>/dev/null | head -10

    echo ""
    [ "$audit_passed" = true ] && echo "AUDIT RESULT: PASS" && exit 0 || echo "AUDIT RESULT: FAIL" && exit 1
  remediation_script_content: |-
    #!/bin/bash
    # CIS Benchmark 2.3.3 - Ensure chrony is configured with authorized timeserver
    echo "Applying remediation for CIS 2.3.3..."

    # Check if chrony is installed
    chrony_status=$(dpkg-query -W -f='${db:Status-Status}' chrony 2>/dev/null)
    if [ "$chrony_status" != "installed" ]; then
        echo "INFO: chrony is not installed, skipping"
        return 0
    fi

    config_file="/etc/chrony/chrony.conf"

    # Backup original config
    if [ -f "$config_file" ]; then
        cp "$config_file" "${config_file}.bak"
    fi

    # Add NTP servers if not already configured
    if ! grep -Eq "^(server|pool).*nist.gov" "$config_file" 2>/dev/null; then
        echo "" >> "$config_file"
        echo "# CIS Benchmark authorized NTP servers" >> "$config_file"
        echo "pool time.nist.gov iburst" >> "$config_file"
        echo "pool pool.ntp.org iburst" >> "$config_file"
        echo "Added NTP servers to $config_file"
    fi

    # Restart chrony if enabled
    if systemctl is-enabled chrony.service 2>/dev/null | grep -q "enabled"; then
        echo "Restarting chrony..."
        systemctl restart chrony.service
    fi

    echo "Remediation complete for CIS 2.3.3"
