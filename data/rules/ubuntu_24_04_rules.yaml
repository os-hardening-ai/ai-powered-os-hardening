  audit_command: if dpkg-query -s aide aide-common &>/dev/null; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.3/6.3.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.3/6.3.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    echo "Checking if AIDE is installed..."
