  audit_script_content: "#!/bin/bash\n# CIS Benchmark 1.5.2 - Ensure ptrace_scope is restricted (Automated)\n# Profile: Level\
    \ 1 - Server, Level 1 - Workstation\n#\n# NOTE: Ubuntu ships with /etc/sysctl.d/10-ptrace.conf which sets\n# kernel.yama.ptrace_scope\
    \ = 1 by default (already CIS compliant)\n\naudit_ptrace_scope() {\n    local l_output=\"\"\n    local l_output2=\"\"\n\
    \    local l_parameter_name=\"kernel.yama.ptrace_scope\"\n    \n    # Check running configuration\n    local l_running_value\n\
    \    l_running_value=\"$(sysctl -n \"$l_parameter_name\" 2>/dev/null)\"\n    \n    if [ -z \"$l_running_value\" ]; then\n\
    \        l_output2=\"$l_output2\\n - Unable to read $l_parameter_name from running configuration (Yama LSM may not be\
    \ enabled)\"\n    elif [[ \"$l_running_value\" =~ ^[123]$ ]]; then\n        l_output=\"$l_output\\n - \\\"$l_parameter_name\\\
    \" is correctly set to \\\"$l_running_value\\\" in the running configuration\"\n    else\n        l_output2=\"$l_output2\\\
    n - \\\"$l_parameter_name\\\" is incorrectly set to \\\"$l_running_value\\\" in the running configuration (should be 1,\
    \ 2, or 3)\"\n    fi\n    \n    # Check durable settings in configuration files\n    local l_file_found=false\n    local\
    \ l_file_value=\"\"\n    local l_config_file=\"\"\n    \n    # Check /etc/sysctl.conf and /etc/sysctl.d/*.conf\n    #\
    \ Only match lines that are NOT commented out (no leading #)\n    for l_file in /etc/sysctl.conf /etc/sysctl.d/*.conf;\
    \ do\n        if [ -f \"$l_file\" ]; then\n            # Extract only uncommented lines, get the last occurrence\n   \
    \         local l_match\n            l_match=\"$(grep -E \"^[^#]*$l_parameter_name\\s*=\" \"$l_file\" 2>/dev/null | tail\
    \ -1)\"\n            if [ -n \"$l_match\" ]; then\n                l_file_value=\"$(echo \"$l_match\" | awk -F= '{print\
    \ $2}' | tr -d ' \\t')\"\n                if [ -n \"$l_file_value\" ]; then\n                    l_file_found=true\n \
    \                   l_config_file=\"$l_file\"\n                fi\n            fi\n        fi\n    done\n    \n    # Check\
    \ UFW sysctl file if exists\n    if [ -f /etc/default/ufw ]; then\n        local l_ufwscf\n        l_ufwscf=\"$(awk -F=\
    \ '/^\\s*IPT_SYSCTL=/ {print $2}' /etc/default/ufw | tr -d '\"')\"\n        if [ -n \"$l_ufwscf\" ] && [ -f \"$l_ufwscf\"\
    \ ]; then\n            local l_match\n            l_match=\"$(grep -E \"^[^#]*$l_parameter_name\\s*=\" \"$l_ufwscf\" 2>/dev/null\
    \ | tail -1)\"\n            if [ -n \"$l_match\" ]; then\n                local l_ufw_value\n                l_ufw_value=\"\
    $(echo \"$l_match\" | awk -F= '{print $2}' | tr -d ' \\t')\"\n                if [ -n \"$l_ufw_value\" ]; then\n     \
    \               l_file_found=true\n                    l_file_value=\"$l_ufw_value\"\n                    l_config_file=\"\
    $l_ufwscf\"\n                fi\n            fi\n        fi\n    fi\n    \n    if [ \"$l_file_found\" = true ]; then\n\
    \        if [[ \"$l_file_value\" =~ ^[123]$ ]]; then\n            l_output=\"$l_output\\n - \\\"$l_parameter_name\\\"\
    \ is correctly set to \\\"$l_file_value\\\" in \\\"$l_config_file\\\"\"\n        else\n            l_output2=\"$l_output2\\\
    n - \\\"$l_parameter_name\\\" is incorrectly set to \\\"$l_file_value\\\" in \\\"$l_config_file\\\" (should be 1, 2, or\
    \ 3)\"\n        fi\n    else\n        l_output2=\"$l_output2\\n - \\\"$l_parameter_name\\\" is not set in any sysctl configuration\
    \ file\"\n        l_output2=\"$l_output2\\n   (Note: Check if the value is commented out or file is missing)\"\n    fi\n\
    \    \n    # Output results\n    if [ -z \"$l_output2\" ]; then\n        echo -e \"\\n- Audit Result: ** PASS **\"\n \
    \       echo -e \"$l_output\\n\"\n        return 0\n    else\n        echo -e \"\\n- Audit Result: ** FAIL **\"\n    \
    \    echo -e \" - Reason(s) for audit failure:\"\n        echo -e \"$l_output2\"\n        if [ -n \"$l_output\" ]; then\n\
    \            echo -e \"\\n- Correctly set:\"\n            echo -e \"$l_output\\n\"\n        fi\n        return 1\n   \
    \ fi\n}\n\naudit_ptrace_scope"
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.5.2 - Ensure ptrace_scope is restricted (Automated)\n# Profile:\
    \ Level 1 - Server, Level 1 - Workstation\n#\n# Remediation: Set kernel.yama.ptrace_scope to 1 (restricted ptrace)\n#\n\
    # NOTE: Ubuntu ships with /etc/sysctl.d/10-ptrace.conf by default.\n# This script uses a dedicated file /etc/sysctl.d/60-ptrace_scope.conf\n\
    # to ensure our setting takes precedence (higher number = loaded later)\n\nremediate_ptrace_scope() {\n    local l_parameter_name=\"\
    kernel.yama.ptrace_scope\"\n    local l_parameter_value=\"1\"  # Using restricted mode (value 1) as default\n    local\
    \ l_sysctl_file=\"/etc/sysctl.d/60-ptrace_scope.conf\"\n    \n    echo \"Setting $l_parameter_name to $l_parameter_value...\"\
    \n    \n    # Create directory if it doesn't exist\n    if [ ! -d \"/etc/sysctl.d\" ]; then\n        mkdir -p /etc/sysctl.d\n\
    \    fi\n    \n    # Comment out (not delete) any existing entries to preserve original config\n    for l_file in /etc/sysctl.conf\
    \ /etc/sysctl.d/*.conf; do\n        if [ -f \"$l_file\" ] && [ \"$l_file\" != \"$l_sysctl_file\" ]; then\n           \
    \ # Only modify if there's an uncommented entry\n            if grep -Eq \"^[^#]*$l_parameter_name\\s*=\" \"$l_file\"\
    \ 2>/dev/null; then\n                echo \" - Commenting out existing entry in $l_file\"\n                sed -i \"s/^\\\
    ([^#]*$l_parameter_name\\s*=\\)/# \\1/\" \"$l_file\"\n            fi\n        fi\n    done\n    \n    # Check and update\
    \ UFW sysctl file if exists\n    if [ -f /etc/default/ufw ]; then\n        local l_ufwscf\n        l_ufwscf=\"$(awk -F=\
    \ '/^\\s*IPT_SYSCTL=/ {print $2}' /etc/default/ufw | tr -d '\"')\"\n        if [ -n \"$l_ufwscf\" ] && [ -f \"$l_ufwscf\"\
    \ ]; then\n            if grep -Eq \"^[^#]*$l_parameter_name\\s*=\" \"$l_ufwscf\" 2>/dev/null; then\n                echo\
    \ \" - Commenting out existing entry in $l_ufwscf\"\n                sed -i \"s/^\\([^#]*$l_parameter_name\\s*=\\)/# \\\
    1/\" \"$l_ufwscf\"\n            fi\n        fi\n    fi\n    \n    # Create or overwrite our dedicated configuration file\n\
    \    echo \" - Writing $l_parameter_name=$l_parameter_value to $l_sysctl_file\"\n    printf '%s\\n' \\\n        \"# CIS\
    \ Benchmark 1.5.2 - Ensure ptrace_scope is restricted\" \\\n        \"# Generated by remediation script on $(date)\" \\\
    \n        \"# Values: 1=restricted, 2=admin-only, 3=no attach (irreversible)\" \\\n        \"$l_parameter_name=$l_parameter_value\"\
    \ > \"$l_sysctl_file\"\n    \n    # Set the active kernel parameter\n    echo \" - Applying to running kernel...\"\n \
    \   if sysctl -w \"$l_parameter_name=$l_parameter_value\" > /dev/null 2>&1; then\n        echo \" - Successfully set $l_parameter_name\
    \ to $l_parameter_value in running configuration\"\n    else\n        echo \" - WARNING: Failed to set $l_parameter_name\
    \ in running configuration\"\n        echo \"   Yama LSM may not be enabled in the kernel\"\n        return 1\n    fi\n\
    \    \n    echo \"\"\n    echo \"Remediation complete.\"\n    echo \"\"\n    echo \"Configuration saved to: $l_sysctl_file\"\
    \n    echo \"\"\n    echo \"Value meanings:\"\n    echo \"  1 = Restricted ptrace (only descendants can be traced)\"\n\
    \    echo \"  2 = Admin-only attach (requires CAP_SYS_PTRACE)\"\n    echo \"  3 = No attach (ptrace completely disabled,\
    \ irreversible until reboot)\"\n    echo \"\"\n    echo \"If a value of 2 or 3 is required by local site policy,\"\n \
    \   echo \"edit $l_sysctl_file and run: sysctl -p $l_sysctl_file\"\n    \n    return 0\n}\n\nremediate_ptrace_scope"
