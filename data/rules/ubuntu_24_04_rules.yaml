    has incorrect permissions'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/ssh/sshd_config
  - /etc/ssh/sshd_config...
  audit_command: actual=$(stat -Lc "%a %u %g" /etc/ssh/sshd_config 2>/dev/null)
  remediation_command: chown root:root /etc/ssh/sshd_config; chmod 600 /etc/ssh/sshd_config
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.1/5.1.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.1/5.1.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # Check permissions on /etc/ssh/sshd_config
    actual=$(stat -Lc "%a %u %g" /etc/ssh/sshd_config 2>/dev/null)

    if [ "$actual" = "600 0 0" ]; then
        echo "PASS: /etc/ssh/sshd_config has correct permissions (600 0 0)"
        exit 0
    else
        echo "FAIL: /etc/ssh/sshd_config has incorrect permissions"
        echo "  Expected: 600 0 0"
        echo "  Actual: $actual"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # Remediate permissions on /etc/ssh/sshd_config
    echo "Setting permissions on /etc/ssh/sshd_config..."

    if [ -f /etc/ssh/sshd_config ]; then
        chown root:root /etc/ssh/sshd_config
        chmod 600 /etc/ssh/sshd_config
        echo "SUCCESS: Permissions set to 600, owner set to root:root"
    else
        echo "ERROR: /etc/ssh/sshd_config not found"
        return 1
    fi
  tags:
  - access_control
  - authentication
  - authorization
  - file_permissions
