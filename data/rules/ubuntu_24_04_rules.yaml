- id: 5.1.2
  section: 5.1.2
  category: Access Authentication and Authorization
  title: permissions on SSH private host key files
  description: 'Denetim: $file has incorrect permissions'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: actual=$(stat -Lc "%a %u %g" "$file" 2>/dev/null)
  remediation_command: find /etc/ssh -xdev -type f -name 'ssh_host_*_key' -exec chmod 600 {} \;; find /etc/ssh -xdev -type
    f -name 'ssh_host_*_key' -exec chown root:root {} \;
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.1/5.1.2/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.1/5.1.2/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # Check permissions on SSH private host key files
    failed=0
    while IFS= read -r file; do
        actual=$(stat -Lc "%a %u %g" "$file" 2>/dev/null)
        if [ "$actual" != "600 0 0" ]; then
            echo "FAIL: $file has incorrect permissions"
            echo "  Expected: 600 0 0"
            echo "  Actual: $actual"
            failed=1
        fi
    done < <(find /etc/ssh -xdev -type f -name 'ssh_host_*_key' 2>/dev/null)

    if [ $failed -eq 0 ]; then
        echo "PASS: All SSH private host key files have correct permissions"
        exit 0
    else
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # Remediate permissions on SSH private host key files
    echo "Setting permissions on SSH private host key files..."

    find /etc/ssh -xdev -type f -name 'ssh_host_*_key' -exec chmod 600 {} \;
    find /etc/ssh -xdev -type f -name 'ssh_host_*_key' -exec chown root:root {} \;

    echo "SUCCESS: All SSH private host key files secured"
  tags:
  - access_control
  - authentication
  - authorization
  - file_permissions
  - ssh
