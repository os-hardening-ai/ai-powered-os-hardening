  remediation_command: sed -i 's/^\$FileCreateMode.*/$FileCreateMode 0640/' /etc/rsyslog.conf; systemctl restart rsyslog
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.1/6.1.3/6.1.3.4/audit.sh
