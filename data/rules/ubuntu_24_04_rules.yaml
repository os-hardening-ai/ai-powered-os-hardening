  audit_script_content: "#!/bin/bash\n# CIS Benchmark 1.6.4 - Ensure access to /etc/motd is configured\n# Audit Script\n\n\
    audit_passed=true\n\necho \"Checking /etc/motd access configuration...\"\n\nmotd_file=\"/etc/motd\"\n\n# Check if /etc/motd\
    \ exists\nif [ -e \"$motd_file\" ]; then\n    echo \"INFO: $motd_file exists\"\n    \n    # Resolve symlinks\n    real_file=$(readlink\
    \ -e \"$motd_file\")\n    \n    # Get file permissions, owner, and group\n    file_perms=$(stat -Lc '%a' \"$real_file\"\
    )\n    file_uid=$(stat -Lc '%u' \"$real_file\")\n    file_gid=$(stat -Lc '%g' \"$real_file\")\n    \n    echo \"Current\
    \ status:\"\n    stat -Lc 'Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' \"$real_file\"\n    echo \"\"\n    \n    #\
    \ Check ownership (should be root:root, uid=0, gid=0)\n    if [ \"$file_uid\" -eq 0 ] && [ \"$file_gid\" -eq 0 ]; then\n\
    \        echo \"PASS: Owner and group are root (0:0)\"\n    else\n        echo \"FAIL: Owner ($file_uid) and/or group\
    \ ($file_gid) are not root (0)\"\n        audit_passed=false\n    fi\n    \n    # Check permissions (should be 644 or\
    \ more restrictive)\n    # 644 means: owner=rw (6), group=r (4), others=r (4)\n    # More restrictive means:\n    # -\
    \ Owner: 0, 2, 4, or 6 (no execute bit, max rw)\n    # - Group: 0 or 4 only (no write, no execute)\n    # - Others: 0\
    \ or 4 only (no write, no execute)\n    \n    # Pad permissions to 3 digits\n    padded_perms=$(printf \"%03d\" \"$file_perms\"\
    )\n    \n    # Extract individual permission digits\n    owner_perm=${padded_perms:0:1}\n    group_perm=${padded_perms:1:1}\n\
    \    other_perm=${padded_perms:2:1}\n    \n    perm_ok=true\n    perm_errors=\"\"\n    \n    # Check owner permissions\
    \ (should be 0, 2, 4, or 6 - no execute, max rw)\n    case \"$owner_perm\" in\n        0|2|4|6) ;;\n        *) perm_ok=false;\
    \ perm_errors=\"$perm_errors Owner has invalid permission ($owner_perm).\" ;;\n    esac\n    \n    # Check group permissions\
    \ (should be 0 or 4 only - read or none)\n    case \"$group_perm\" in\n        0|4) ;;\n        *) perm_ok=false; perm_errors=\"\
    $perm_errors Group has invalid permission ($group_perm).\" ;;\n    esac\n    \n    # Check other permissions (should be\
    \ 0 or 4 only - read or none)\n    case \"$other_perm\" in\n        0|4) ;;\n        *) perm_ok=false; perm_errors=\"\
    $perm_errors Others has invalid permission ($other_perm).\" ;;\n    esac\n    \n    if [ \"$perm_ok\" = true ]; then\n\
    \        echo \"PASS: Permissions ($file_perms) are 644 or more restrictive\"\n    else\n        echo \"FAIL: Permissions\
    \ ($file_perms) are not compliant\"\n        echo \"      Errors:$perm_errors\"\n        echo \"      Expected: 644 or\
    \ more restrictive (e.g., 644, 640, 600, 400, 444, 440, 404, 000)\"\n        audit_passed=false\n    fi\nelse\n    echo\
    \ \"INFO: $motd_file does not exist (this is acceptable)\"\nfi\n\n# Final result\necho \"\"\nif [ \"$audit_passed\" =\
    \ true ]; then\n    echo \"AUDIT RESULT: PASS - Access to /etc/motd is configured properly\"\n    exit 0\nelse\n    echo\
    \ \"AUDIT RESULT: FAIL - Access to /etc/motd is not configured properly\"\n    exit 1\nfi"
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.6.4 - Ensure access to /etc/motd is configured\n# Remediation\
    \ Script\n\necho \"Applying remediation for CIS 1.6.4 - Ensure access to /etc/motd is configured...\"\n\nmotd_file=\"\
