  section: 6.1.1
  category: System Maintenance
  title: Ensure only one logging system is in use
  description: 'Bu kural /etc/systemd/journald.conf dosyasinin guvenlik yapilandirmasini denetler. Denetim: systemd-journald
    is not active'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/systemd/journald.conf
  audit_command: rsyslog_active=$(systemctl is-active rsyslog 2>/dev/null)
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.1/6.1.1/6.1.1.4/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S6/6.1/6.1.1/6.1.1.4/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # 6.1.1.4 Ensure only one logging system is in use (Automated)

    echo "Checking if only one logging system is active..."

    # Check if rsyslog is active
    rsyslog_active=$(systemctl is-active rsyslog 2>/dev/null)
    # Check if journald is active
    journald_active=$(systemctl is-active systemd-journald 2>/dev/null)

    echo "rsyslog status: ${rsyslog_active:-not installed}"
    echo "systemd-journald status: ${journald_active:-not installed}"

    # If journald is configured to forward to syslog, both can coexist
    forward_to_syslog=$(grep -E "^ForwardToSyslog=" /etc/systemd/journald.conf 2>/dev/null | grep -i "yes")

    if [ "$journald_active" = "active" ]; then
        if [ "$rsyslog_active" = "active" ] && [ -z "$forward_to_syslog" ]; then
            echo "WARNING: Both journald and rsyslog are active without ForwardToSyslog"
            echo "This may result in duplicate logging"
            exit 1
        else
            echo "PASS: Logging system configuration is appropriate"
            exit 0
        fi
    else
        echo "FAIL: systemd-journald is not active"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # 6.1.1.4 Ensure only one logging system is in use (Automated)

    echo "Configuring logging system..."
    echo "Choose your logging system:"
    echo "1. Use systemd-journald only (disable rsyslog)"
    echo "2. Use both with ForwardToSyslog enabled"
    echo ""
    echo "Manual intervention required to make this decision"
    echo ""
    echo "To use journald only:"
    echo "  systemctl --now disable rsyslog"
    echo ""
    echo "To use both:"
    echo "  Edit /etc/systemd/journald.conf and set ForwardToSyslog=yes"
    echo "  systemctl restart systemd-journald"
