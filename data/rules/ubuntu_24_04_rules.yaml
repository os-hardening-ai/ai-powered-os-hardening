  - filesystem
  - initial_setup
  - kernel_module
- id: 1.5.4
  section: 1.5.4
  category: Initial Setup and Filesystem Configuration
  title: CIS Rule 1.5.4
  description: 'Denetim: prelink is installed'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: if dpkg-query -s prelink &>/dev/null; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.4/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.4/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS Benchmark 1.5.4 - Ensure prelink is not installed
    # Audit Script

    echo "Checking if prelink is installed..."

    if dpkg-query -s prelink &>/dev/null; then
        echo "FAIL: prelink is installed"
        echo ""
        echo "AUDIT RESULT: FAIL - prelink should not be installed"
        exit 1
    else
        echo "PASS: prelink is not installed"
        echo ""
        echo "AUDIT RESULT: PASS - prelink is not installed"
        exit 0
    fi
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.5.4 - Ensure prelink is not installed\n# Remediation Script\n\
    \necho \"Applying remediation for CIS 1.5.4 - Ensure prelink is not installed...\"\n\n# Check if prelink is installed\n\
    if dpkg-query -s prelink &>/dev/null; then\n    echo \"prelink is installed, removing...\"\n    \n    # Restore binaries\
    \ to normal before uninstalling\n    echo \"Restoring binaries to normal state...\"\n    if command -v prelink &>/dev/null;\
    \ then\n        if prelink -ua 2>/dev/null; then\n            echo \"Successfully restored binaries to normal\"\n    \
    \    else\n            echo \"WARNING: Failed to restore binaries (prelink -ua)\"\n        fi\n    fi\n    \n    # Uninstall\
    \ prelink\n    echo \"Uninstalling prelink...\"\n    if apt purge -y prelink; then\n        echo \"Successfully removed\
    \ prelink\"\n    else\n        echo \"ERROR: Failed to remove prelink\"\n        return 1\n    fi\nelse\n    echo \"prelink\
    \ is not installed, no action needed\"\nfi\n\necho \"\"\necho \"Remediation complete for CIS 1.5.4 - Ensure prelink is\
    \ not installed\""
