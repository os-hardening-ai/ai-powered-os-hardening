- id: 5.3.3.1.1
  section: 5.3.3
  category: Access Authentication and Authorization
  title: password failed attempts lockout
  description: 'Bu kural /etc/security/faillock.conf dosyasinin guvenlik yapilandirmasini denetler. Denetim: Password lockout
    too high: deny = $deny (should be 5 or less)'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/security/faillock.conf
  audit_command: result=$(grep -Pi -- '^\h*deny\h*=' /etc/security/faillock.conf 2>/dev/null)
  remediation_command: log_info() { echo "[INFO] $1"; }; log_success() { echo "[SUCCESS] $1"; }; log_error() { echo "[ERROR]
    $1"; }
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.3/5.3.3/5.3.3.1/5.3.3.1.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.3/5.3.3/5.3.3.1/5.3.3.1.1/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # Check password failed attempts lockout
    result=$(grep -Pi -- '^\h*deny\h*=' /etc/security/faillock.conf 2>/dev/null)

    if [ -n "$result" ]; then
        deny=$(echo "$result" | grep -oP 'deny\h*=\h*\K[0-9]+')
        if [ "$deny" -le 5 ] && [ "$deny" -gt 0 ]; then
            echo "PASS: Password lockout configured: deny = $deny"
            exit 0
        else
            echo "FAIL: Password lockout too high: deny = $deny (should be 5 or less)"
            exit 1
        fi
    else
        echo "FAIL: Password lockout (deny) is not configured"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.3.3.1.1 - Ensure password failed attempts lockout is configured
    # Configure deny parameter in faillock.conf

    SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
    HELPERS="${SCRIPT_DIR}/../../common/pam_helpers.sh"

    # Source helper functions if available
    if [ -f "$HELPERS" ]; then
        source "$HELPERS"
    else
        # Fallback log functions
        log_info() { echo "[INFO] $1"; }
        log_success() { echo "[SUCCESS] $1"; }
        log_error() { echo "[ERROR] $1"; }
    fi

    FAILLOCK_CONF="/etc/security/faillock.conf"
    DENY_VALUE=5

    log_info "Parola kilitleme yapılandırılıyor (deny = $DENY_VALUE)..."

    # Dosya yoksa oluştur
    if [ ! -f "$FAILLOCK_CONF" ]; then
        touch "$FAILLOCK_CONF"
        log_info "Oluşturuldu: $FAILLOCK_CONF"
    fi

    # Mevcut deny satırını kontrol et ve güncelle (duplicate önleme)
    if grep -qi '^\s*deny\s*=' "$FAILLOCK_CONF" 2>/dev/null; then
        # Mevcut değeri güncelle
        sed -i 's/^\s*deny\s*=.*/deny = '"$DENY_VALUE"'/' "$FAILLOCK_CONF"
        log_info "Güncellendi: deny = $DENY_VALUE"
    elif grep -qi '^#\s*deny\s*=' "$FAILLOCK_CONF" 2>/dev/null; then
        # Yorum satırını aktifleştir
        sed -i 's/^#\s*deny\s*=.*/deny = '"$DENY_VALUE"'/' "$FAILLOCK_CONF"
        log_info "Aktifleştirildi: deny = $DENY_VALUE"
    else
        # Yeni satır ekle
        echo "deny = $DENY_VALUE" >> "$FAILLOCK_CONF"
        log_info "Eklendi: deny = $DENY_VALUE"
    fi

    # Doğrulama
    if grep -qi "^\s*deny\s*=\s*$DENY_VALUE" "$FAILLOCK_CONF"; then
        log_success "Parola kilitleme yapılandırıldı: $DENY_VALUE başarısız denemede hesap kilitlenecek"
    else
        log_error "Yapılandırma doğrulanamadı!"
        return 1
    fi

    echo ""
    echo "NOT: Bu ayar pam_faillock modülü etkinleştirildiğinde etkili olacak (5.3.2.2)"
