    # Check if audit=1 is set in kernel parameters
    grub_audit=$(grep -E "^\s*linux" /boot/grub/grub.cfg 2>/dev/null | grep -v "audit=1")

    if [ -z "$grub_audit" ]; then
        echo "PASS: audit=1 is set in all kernel boot parameters"
