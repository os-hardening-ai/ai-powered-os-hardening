- id: 1.5.5
  section: 1.5.5
  category: Initial Setup and Filesystem Configuration
  title: '1: Verify apport is not installed or not enabled'
  description: 'Bu kural /etc/default/apport dosyasinin guvenlik yapilandirmasini denetler. Denetim: Apport is enabled in
    /etc/default/apport'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/default/apport
  audit_command: if dpkg-query -s apport &>/dev/null; then
  remediation_command: sed -i 's/^\s*enabled\s*=.*/enabled=0/' "$apport_default"; if systemctl stop apport.service 2>/dev/null;
    then; if systemctl mask apport.service 2>/dev/null; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.5/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.5/remediation.sh
  audit_script_content: "#!/bin/bash\n# CIS Benchmark 1.5.5 - Ensure Automatic Error Reporting is not enabled\n# Audit Script\n\
    \naudit_passed=true\n\necho \"Checking Apport Error Reporting Service...\"\n\n# Check 1: Verify apport is not installed\
    \ or not enabled\necho \"Checking if apport is installed and enabled...\"\nif dpkg-query -s apport &>/dev/null; then\n\
    \    echo \"INFO: apport package is installed\"\n    \n    # Check if enabled in /etc/default/apport\n    if [ -f /etc/default/apport\
    \ ]; then\n        if grep -Pqi -- '^\\h*enabled\\h*=\\h*[^0]\\b' /etc/default/apport; then\n            echo \"FAIL:\
    \ Apport is enabled in /etc/default/apport\"\n            audit_passed=false\n        else\n            echo \"PASS: Apport\
    \ is disabled in /etc/default/apport (enabled=0 or not set)\"\n        fi\n    else\n        echo \"INFO: /etc/default/apport\
    \ does not exist\"\n    fi\nelse\n    echo \"PASS: apport package is not installed\"\nfi\n\n# Check 2: Verify apport service\
    \ is not active\necho \"Checking if apport service is active...\"\nif systemctl is-active apport.service 2>/dev/null |\
    \ grep -q '^active'; then\n    echo \"FAIL: apport.service is active\"\n    audit_passed=false\nelse\n    echo \"PASS:\
    \ apport.service is not active\"\nfi\n\n# Final result\necho \"\"\nif [ \"$audit_passed\" = true ]; then\n    echo \"\
    AUDIT RESULT: PASS - Automatic Error Reporting is not enabled\"\n    exit 0\nelse\n    echo \"AUDIT RESULT: FAIL - Automatic\
    \ Error Reporting is enabled\"\n    exit 1\nfi"
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.5.5 - Ensure Automatic Error Reporting is not enabled\n# Remediation\
    \ Script\n\necho \"Applying remediation for CIS 1.5.5 - Ensure Automatic Error Reporting is not enabled...\"\n\n# Check\
    \ if apport is installed\nif dpkg-query -s apport &>/dev/null; then\n    echo \"apport is installed, disabling...\"\n\
    \    \n    # Disable apport in /etc/default/apport\n    apport_default=\"/etc/default/apport\"\n    if [ -f \"$apport_default\"\
    \ ]; then\n        echo \"Configuring $apport_default...\"\n        if grep -Pq '^\\h*enabled\\h*=' \"$apport_default\"\
    ; then\n            # Replace existing enabled line\n            sed -i 's/^\\s*enabled\\s*=.*/enabled=0/' \"$apport_default\"\
    \n            echo \"Updated enabled=0 in $apport_default\"\n        else\n            # Add enabled=0 if not present\n\
    \            echo \"enabled=0\" >> \"$apport_default\"\n            echo \"Added enabled=0 to $apport_default\"\n    \
    \    fi\n    else\n        # Create the file with enabled=0\n        echo \"enabled=0\" > \"$apport_default\"\n      \
    \  echo \"Created $apport_default with enabled=0\"\n    fi\n    \n    # Stop and mask the apport service\n    echo \"\
    Stopping apport service...\"\n    if systemctl stop apport.service 2>/dev/null; then\n        echo \"Successfully stopped\
    \ apport.service\"\n    else\n        echo \"INFO: apport.service was not running or could not be stopped\"\n    fi\n\
    \    \n    echo \"Masking apport service...\"\n    if systemctl mask apport.service 2>/dev/null; then\n        echo \"\
    Successfully masked apport.service\"\n    else\n        echo \"WARNING: Failed to mask apport.service\"\n    fi\nelse\n\
    \    echo \"apport is not installed, no action needed\"\nfi\n\necho \"\"\necho \"Remediation complete for CIS 1.5.5 -\
    \ Ensure Automatic Error Reporting is not enabled\""
