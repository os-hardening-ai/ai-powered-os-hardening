  remediation_command: chown root:root /etc/at.allow; chmod 640 /etc/at.allow
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.4/2.4.2/2.4.2.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S2/2.4/2.4.2/2.4.2.1/remediation.sh
  audit_script_content: "#!/bin/bash\n# CIS 2.4.2.1 Ensure at is restricted to authorized users\n\necho \"Checking at access\
    \ restrictions...\"\n\n# First check if at is installed\nif ! dpkg -l | grep -q \"^ii.*\\bat\\b\"; then\n    echo \"INFO:\
    \ at is not installed - this control is not applicable\"\n    echo \"\"\n    echo \"AUDIT RESULT: PASS - Not applicable\"\
    \n    exit 0\nfi\n\nFAIL=0\n\n# Check if at.deny exists (it should NOT exist)\nif [ -f /etc/at.deny ]; then\n    echo\
    \ \"FAIL: /etc/at.deny exists (should be removed)\"\n    FAIL=1\nelse\n    echo \"PASS: /etc/at.deny does not exist\"\n\
    fi\n\n# Check if at.allow exists\nif [ -f /etc/at.allow ]; then\n    PERMS=$(stat -Lc \"%a\" /etc/at.allow)\n    UID=$(stat\
    \ -Lc \"%u\" /etc/at.allow)\n    GID=$(stat -Lc \"%g\" /etc/at.allow)\n    \n    # Check ownership (should be root:root\
    \ - UID 0, GID 0)\n    if [ \"$UID\" -eq 0 ] && [ \"$GID\" -eq 0 ]; then\n        echo \"PASS: /etc/at.allow is owned\
    \ by root:root\"\n    else\n        echo \"FAIL: /etc/at.allow is not owned by root:root (UID: $UID, GID: $GID)\"\n  \
    \      FAIL=1\n    fi\n    \n    # Check permissions (should be 640 or more restrictive)\n    if [ \"$PERMS\" -le 640\
    \ ]; then\n        echo \"PASS: /etc/at.allow permissions are $PERMS (640 or more restrictive)\"\n    else\n        echo\
    \ \"FAIL: /etc/at.allow permissions are $PERMS (should be 640 or more restrictive)\"\n        FAIL=1\n    fi\nelse\n \
    \   echo \"FAIL: /etc/at.allow does not exist\"\n    FAIL=1\nfi\n\nif [ \"$FAIL\" -eq 0 ]; then\n    echo \"\"\n    echo\
    \ \"AUDIT RESULT: PASS\"\n    exit 0\nelse\n    echo \"\"\n    echo \"AUDIT RESULT: FAIL\"\n    exit 1\nfi"
