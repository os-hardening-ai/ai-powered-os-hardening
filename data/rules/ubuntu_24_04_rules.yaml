- id: 5.2.6
  section: 5.2.6
  category: Access Authentication and Authorization
  title: sudo authentication timeout
  description: 'Bu kural /etc/sudoers dosyasinin guvenlik yapilandirmasini denetler. Denetim: sudo timeout is too long: $timeout
    minutes (should be 15 or less)'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/sudoers
  - /etc/sudoers.d/timeout
  audit_command: result=$(grep -rPi -- '^\h*Defaults\h+([^#]+,\h*)?timestamp_timeout\h*=' /etc/sudoers* 2>/dev/null)
  remediation_command: chmod 440 /etc/sudoers.d/timeout
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.2/5.2.6/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.2/5.2.6/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # Check sudo authentication timeout
    result=$(grep -rPi -- '^\h*Defaults\h+([^#]+,\h*)?timestamp_timeout\h*=' /etc/sudoers* 2>/dev/null)

    if [ -n "$result" ]; then
        timeout=$(echo "$result" | grep -oP 'timestamp_timeout\h*=\h*\K[0-9]+' | head -1)
        if [ -n "$timeout" ] && [ "$timeout" -le 15 ]; then
            echo "PASS: sudo timeout is configured correctly: $timeout minutes"
            exit 0
        else
            echo "FAIL: sudo timeout is too long: $timeout minutes (should be 15 or less)"
            exit 1
        fi
    else
        echo "FAIL: sudo timeout is not configured (using default of 15 minutes)"
        echo "  Consider explicitly setting timestamp_timeout for security"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # Configure sudo timeout
    echo "Configuring sudo authentication timeout..."

    if grep -rPi -- '^\h*Defaults\h+([^#]+,\h*)?timestamp_timeout\h*=' /etc/sudoers* &>/dev/null; then
        echo "INFO: timestamp_timeout already configured"
        grep -rPi -- '^\h*Defaults\h+([^#]+,\h*)?timestamp_timeout\h*=' /etc/sudoers*
    else
        echo 'Defaults timestamp_timeout=15' > /etc/sudoers.d/timeout
        chmod 440 /etc/sudoers.d/timeout
        echo "SUCCESS: Configured sudo timeout to 15 minutes"
