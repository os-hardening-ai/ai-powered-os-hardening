    else
        echo "unlock_time = $UNLOCK_TIME" >> "$FAILLOCK_CONF"
        log_info "Eklendi: unlock_time = $UNLOCK_TIME"
    fi

    # Doğrulama
    if grep -qi "^\s*unlock_time\s*=\s*$UNLOCK_TIME" "$FAILLOCK_CONF"; then
