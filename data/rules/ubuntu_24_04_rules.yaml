  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S4/4.3/4.3.5/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S4/4.3/4.3.5/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS 4.3.5 Ensure nftables base chains exist

    echo "Checking nftables base chains..."

    FAIL=0
    RULESET=$(nft list ruleset 2>/dev/null)

    for hook in input forward output; do
        if echo "$RULESET" | grep -q "hook $hook"; then
            echo "PASS: $hook chain exists"
        else
            echo "FAIL: $hook chain not found"
            FAIL=1
        fi
    done

    if [ "$FAIL" -eq 0 ]; then
        echo ""
        echo "AUDIT RESULT: PASS"
        exit 0
    else
        echo ""
        echo "AUDIT RESULT: FAIL"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash
    # CIS 4.3.5 Ensure nftables base chains exist

    echo "Applying remediation for CIS 4.3.5..."

    # Create table if not exists
    nft create table inet filter 2>/dev/null

    # Create base chains
    nft 'create chain inet filter input { type filter hook input priority 0; }' 2>/dev/null
    nft 'create chain inet filter forward { type filter hook forward priority 0; }' 2>/dev/null
    nft 'create chain inet filter output { type filter hook output priority 0; }' 2>/dev/null

    echo "Base chains created"
    echo "Remediation complete for CIS 4.3.5"
