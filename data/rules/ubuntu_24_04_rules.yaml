    if systemctl list-unit-files 2>/dev/null | grep -q "bluetooth.service"; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S3/3.1/3.1.3/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S3/3.1/3.1.3/remediation.sh
  audit_script_content: "#!/bin/bash\n# CIS 3.1.3 Ensure bluetooth services are not in use\n\necho \"Checking Bluetooth status...\"\
    \n\nFAIL=0\n\n# Check if bluetooth service exists and is enabled\nif systemctl list-unit-files 2>/dev/null | grep -q \"\
    bluetooth.service\"; then\n    BT_STATUS=$(systemctl is-enabled bluetooth.service 2>/dev/null)\n    if [ \"$BT_STATUS\"\
    \ = \"enabled\" ]; then\n        echo \"FAIL: bluetooth.service is enabled\"\n        FAIL=1\n    elif [ \"$BT_STATUS\"\
    \ = \"masked\" ]; then\n        echo \"PASS: bluetooth.service is masked\"\n    elif [ \"$BT_STATUS\" = \"disabled\" ];\
    \ then\n        echo \"PASS: bluetooth.service is disabled\"\n    else\n        echo \"INFO: bluetooth.service status:\
    \ $BT_STATUS\"\n    fi\n    \n    # Check if service is running\n    if systemctl is-active bluetooth.service 2>/dev/null\
    \ | grep -q \"^active\"; then\n        echo \"FAIL: bluetooth.service is running\"\n        FAIL=1\n    else\n       \
    \ echo \"PASS: bluetooth.service is not running\"\n    fi\nelse\n    echo \"PASS: bluetooth.service does not exist\"\n\
    fi\n\n# Check if bluez package is installed\nif dpkg -l bluez 2>/dev/null | grep -q \"^ii\"; then\n    echo \"WARNING:\
    \ bluez package is installed\"\nelse\n    echo \"PASS: bluez package is not installed\"\nfi\n\nif [ \"$FAIL\" -eq 0 ];\
    \ then\n    echo \"\"\n    echo \"AUDIT RESULT: PASS\"\n    exit 0\nelse\n    echo \"\"\n    echo \"AUDIT RESULT: FAIL\"\
    \n    exit 1\nfi"
  remediation_script_content: |-
    #!/bin/bash
    # CIS 3.1.3 Ensure bluetooth services are not in use

    echo "Applying remediation for CIS 3.1.3..."

    # Stop bluetooth service if running
    if systemctl is-active bluetooth.service 2>/dev/null | grep -q "^active"; then
        systemctl stop bluetooth.service
        echo "Stopped bluetooth.service"
    fi

    # Disable and mask bluetooth service
    if systemctl list-unit-files 2>/dev/null | grep -q "bluetooth.service"; then
        systemctl disable bluetooth.service 2>/dev/null
        systemctl mask bluetooth.service 2>/dev/null
        echo "Disabled and masked bluetooth.service"
    fi

    # Block bluetooth using rfkill if available
    if command -v rfkill &>/dev/null; then
        rfkill block bluetooth 2>/dev/null
        echo "Blocked bluetooth via rfkill"
    fi

    # Create blacklist file for bluetooth modules
    printf '%s\n' \
        "# CIS 3.1.3 - Disable bluetooth modules" \
        "install bluetooth /bin/true" \
        "install btusb /bin/true" > /etc/modprobe.d/disable-bluetooth.conf

    echo "Created /etc/modprobe.d/disable-bluetooth.conf"
    echo ""
    echo "Remediation complete for CIS 3.1.3"
    echo "NOTE: To fully remove bluetooth, run: apt purge bluez -y"
