  - filesystem
  - initial_setup
  - kernel_module
- id: 1.6.1
  section: 1.6.1
  category: Initial Setup and Filesystem Configuration
  title: if /etc/motd exists
  description: 'Bu kural /etc/motd dosyasinin guvenlik yapilandirmasini denetler. Denetim: /etc/motd contains OS information
    that should be removed'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/motd
  - /etc/os-release
  audit_command: if grep -E -i "$pattern" /etc/motd &>/dev/null; then
  remediation_command: sed -i 's/\\m//g; s/\\r//g; s/\\s//g; s/\\v//g' "$motd_file"; sed -i "s/$os_id//gi" "$motd_file"
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.6/1.6.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.6/1.6.1/remediation.sh
  audit_script_content: "#!/bin/bash\n# CIS Benchmark 1.6.1 - Ensure message of the day is configured properly\n# Audit Script\n\
    \naudit_passed=true\n\necho \"Checking /etc/motd configuration...\"\n\n# Check if /etc/motd exists\nif [ -f /etc/motd\
    \ ]; then\n    echo \"INFO: /etc/motd exists\"\n    echo \"\"\n    echo \"Current /etc/motd contents:\"\n    echo \"----------------------------\"\
    \n    cat /etc/motd\n    echo \"----------------------------\"\n    echo \"\"\n    \n    # Get OS ID for checking\n  \
    \  os_id=$(grep '^ID=' /etc/os-release 2>/dev/null | cut -d= -f2 | sed -e 's/\"//g')\n    \n    # Check for prohibited\
    \ content (OS info disclosure)\n    echo \"Checking for prohibited content...\"\n    \n    # Build the pattern\n    pattern=\"\
    (\\\\\\\\v|\\\\\\\\r|\\\\\\\\m|\\\\\\\\s\"\n    if [ -n \"$os_id\" ]; then\n        pattern=\"${pattern}|${os_id}\"\n\
    \    fi\n    pattern=\"${pattern})\"\n    \n    if grep -E -i \"$pattern\" /etc/motd &>/dev/null; then\n        echo \"\
    FAIL: /etc/motd contains OS information that should be removed\"\n        echo \"Found matches:\"\n        grep -E -i\
    \ \"$pattern\" /etc/motd\n        audit_passed=false\n    else\n        echo \"PASS: /etc/motd does not contain prohibited\
    \ OS information\"\n    fi\nelse\n    echo \"INFO: /etc/motd does not exist (this is acceptable)\"\nfi\n\n# Final result\n\
    echo \"\"\nif [ \"$audit_passed\" = true ]; then\n    echo \"AUDIT RESULT: PASS - Message of the day is configured properly\"\
    \n    exit 0\nelse\n    echo \"AUDIT RESULT: FAIL - Message of the day contains prohibited content\"\n    exit 1\nfi"
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.6.1 - Ensure message of the day is configured properly\n# Remediation\
    \ Script\n\necho \"Applying remediation for CIS 1.6.1 - Ensure message of the day is configured properly...\"\n\nmotd_file=\"\
    /etc/motd\"\n\n# Check if /etc/motd exists\nif [ -f \"$motd_file\" ]; then\n    echo \"Checking $motd_file for prohibited\
    \ content...\"\n    \n    # Get OS ID\n    os_id=$(grep '^ID=' /etc/os-release 2>/dev/null | cut -d= -f2 | sed -e 's/\"\
    //g')\n    \n    # Remove escape sequences that display OS information\n    echo \"Removing OS information escape sequences...\"\
    \n    \n    # Create a temporary file with cleaned content\n    sed -i 's/\\\\m//g; s/\\\\r//g; s/\\\\s//g; s/\\\\v//g'\
    \ \"$motd_file\"\n    \n    # Remove OS name references (case insensitive)\n    if [ -n \"$os_id\" ]; then\n        sed\
    \ -i \"s/$os_id//gi\" \"$motd_file\"\n    fi\n    \n    echo \"Cleaned $motd_file of prohibited content\"\n    \n    #\
    \ Check if file is now empty or contains only whitespace\n    if [ ! -s \"$motd_file\" ] || ! grep -q '[^[:space:]]' \"\
    $motd_file\"; then\n        echo \"INFO: $motd_file is empty after cleanup\"\n        echo \"Consider adding an appropriate\
    \ message of the day or removing the file\"\n    fi\nelse\n    echo \"INFO: $motd_file does not exist, no action needed\"\
    \nfi\n\necho \"\"\necho \"Remediation complete for CIS 1.6.1 - Ensure message of the day is configured properly\"\necho\
    \ \"\"\necho \"NOTE: Please review /etc/motd and add appropriate content according to your site policy\"\necho \"The file\
    \ should contain a legal warning banner without OS-specific information\""
  tags:
  - filesystem
  - initial_setup
  - kernel_module
- id: 1.6.2
