  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.5/1.5.1/remediation.sh
  audit_script_content: "#!/usr/bin/env bash\n\n# 1.5.1 Ensure address space layout randomization is enabled (Automated)\n\
    # Description: Address space layout randomization (ASLR) is an exploit mitigation \n# technique which randomly arranges\
    \ the address space of key data areas of a process.\n# Rationale: Randomly placing virtual memory regions will make it\
    \ difficult to write \n# memory page exploits as the memory placement will be consistently shifting.\n\n{\n    a_output=();\
    \ a_output2=(); a_parlist=(\"kernel.randomize_va_space=2\")\n    l_ufwscf=\"$([ -f /etc/default/ufw ] && awk -F= '/^\\\
    s*IPT_SYSCTL=/ {print $2}' /etc/default/ufw)\"\n    \n    f_kernel_parameter_chk()\n    {\n        l_running_parameter_value=\"\
    $(sysctl \"$l_parameter_name\" | awk -F= '{print $2}' | xargs)\" # Check running configuration\n        if grep -Pq --\
    \ '\\b'\"$l_parameter_value\"'\\b' <<< \"$l_running_parameter_value\"; then\n            a_output+=(\" - \\\"$l_parameter_name\\\
    \" is correctly set to \\\"$l_running_parameter_value\\\" in the running configuration\")\n        else\n            a_output2+=(\"\
    \ - \\\"$l_parameter_name\\\" is incorrectly set to \\\"$l_running_parameter_value\\\" in the running configuration and\
    \ should have a value of: \\\"$l_value_out\\\"\")\n        fi\n        \n        unset A_out; declare -A A_out # Check\
    \ durable setting (files)\n        while read -r l_out; do\n            if [ -n \"$l_out\" ]; then\n                if\
    \ [[ $l_out =~ ^\\s*# ]]; then\n                    l_file=\"${l_out//# /}\"\n                else\n                 \
    \   l_kpar=\"$(awk -F= '{print $1}' <<< \"$l_out\" | xargs)\"\n                    [ \"$l_kpar\" = \"$l_parameter_name\"\
    \ ] && A_out+=([\"$l_kpar\"]=\"$l_file\")\n                fi\n            fi\n        done < <(\"$l_systemdsysctl\" --cat-config\
    \ | grep -Po '^\\h*([^#\\n\\r]+|#\\h*\\/[^#\\n\\r\\h]+\\.conf\\b)')\n        \n        if [ -n \"$l_ufwscf\" ]; then #\
    \ Account for systems with UFW (Not covered by systemd-sysctl --cat-config)\n            l_kpar=\"$(grep -Po \"^\\h*$l_parameter_name\\\
    b\" \"$l_ufwscf\" | xargs)\"\n            l_kpar=\"${l_kpar//\\//.}\"\n            [ \"$l_kpar\" = \"$l_parameter_name\"\
    \ ] && A_out+=([\"$l_kpar\"]=\"$l_ufwscf\")\n        fi\n        \n        if (( ${#A_out[@]} > 0 )); then # Assess output\
    \ from files and generate output\n            while IFS=\"=\" read -r l_fkpname l_file_parameter_value; do\n         \
    \       l_fkpname=\"${l_fkpname// /}\"; l_file_parameter_value=\"${l_file_parameter_value// /}\"\n                if grep\
    \ -Pq -- '\\b'\"$l_parameter_value\"'\\b' <<< \"$l_file_parameter_value\"; then\n                    a_output+=(\" - \\\
    \"$l_parameter_name\\\" is correctly set to \\\"$l_file_parameter_value\\\" in \\\"$(printf '%s' \"${A_out[@]}\")\\\"\"\
    )\n                else\n                    a_output2+=(\" - \\\"$l_parameter_name\\\" is incorrectly set to \\\"$l_file_parameter_value\\\
    \" in \\\"$(printf '%s' \"${A_out[@]}\")\\\" and should have a value of: \\\"$l_value_out\\\"\")\n                fi\n\
    \            done < <(grep -Po -- \"^\\h*$l_parameter_name\\h*=\\h*\\H+\" \"${A_out[@]}\")\n        else\n           \
    \ a_output2+=(\" - \\\"$l_parameter_name\\\" is not set in an included file\" \\\n                \" ** Note: \\\"$l_parameter_name\\\
    \" May be set in a file that's ignored by load procedure **\")\n        fi\n    }\n    \n    l_systemdsysctl=\"$(readlink\
    \ -f /lib/systemd/systemd-sysctl)\"\n    while IFS=\"=\" read -r l_parameter_name l_parameter_value; do # Assess and check\
    \ parameters\n        l_parameter_name=\"${l_parameter_name// /}\"; l_parameter_value=\"${l_parameter_value// /}\"\n \
    \       l_value_out=\"${l_parameter_value//-/ through }\"; l_value_out=\"${l_value_out//|/ or }\"\n        l_value_out=\"\
    $(tr -d '(){}' <<< \"$l_value_out\")\"\n        f_kernel_parameter_chk\n    done < <(printf '%s\\n' \"${a_parlist[@]}\"\
    )\n    \n    if [ \"${#a_output2[@]}\" -le 0 ]; then\n        printf '%s\\n' \"\" \"- Audit Result:\" \" ** PASS **\"\
    \ \"${a_output[@]}\" \"\"\n        exit 0\n    else\n        printf '%s\\n' \"\" \"- Audit Result:\" \" ** FAIL **\" \"\
    \ - Reason(s) for audit failure:\" \"${a_output2[@]}\"\n        [ \"${#a_output[@]}\" -gt 0 ] && printf '%s\\n' \"\" \"\
    - Correctly set:\" \"${a_output[@]}\" \"\"\n        exit 1\n    fi\n}"
  remediation_script_content: "#!/usr/bin/env bash\n\n# 1.5.1 Ensure address space layout randomization is enabled (Automated)\n\
    # Remediation: Set kernel.randomize_va_space = 2 in sysctl configuration\n# Description: ASLR is an exploit mitigation\
    \ technique which randomly arranges \n# the address space of key data areas of a process.\n\necho \"=== 1.5.1 ASLR Remediation\
    \ ===\"\necho \"\"\n\nSYSCTL_CONF=\"/etc/sysctl.d/60-kernel_sysctl.conf\"\nPARAM_NAME=\"kernel.randomize_va_space\"\n\
    PARAM_VALUE=\"2\"\n\necho \"Setting $PARAM_NAME = $PARAM_VALUE\"\necho \"\"\n\n# Check current running value\necho \"\
    1. Current running configuration:\"\nCURRENT_VALUE=$(sysctl -n \"$PARAM_NAME\" 2>/dev/null)\necho \"   $PARAM_NAME = $CURRENT_VALUE\"\
    \necho \"\"\n\n# Set the parameter in configuration file\necho \"2. Setting durable configuration in $SYSCTL_CONF...\"\
    \n\n# Create the file if it doesn't exist, or update if it does\nif [ -f \"$SYSCTL_CONF\" ]; then\n    # Check if the\
    \ parameter already exists in the file\n    if grep -q \"^$PARAM_NAME\" \"$SYSCTL_CONF\"; then\n        # Update existing\
    \ parameter\n        sed -i \"s/^$PARAM_NAME.*/$PARAM_NAME = $PARAM_VALUE/\" \"$SYSCTL_CONF\"\n        echo \"   [OK]\
    \ Updated existing parameter in $SYSCTL_CONF\"\n    else\n        # Append the parameter\n        printf \"%s\\n\" \"\
    $PARAM_NAME = $PARAM_VALUE\" >> \"$SYSCTL_CONF\"\n        echo \"   [OK] Added parameter to $SYSCTL_CONF\"\n    fi\nelse\n\
    \    # Create new file with the parameter\n    printf \"%s\\n\" \"$PARAM_NAME = $PARAM_VALUE\" >> \"$SYSCTL_CONF\"\n \
    \   echo \"   [OK] Created $SYSCTL_CONF with parameter\"\nfi\n\n# Apply the setting to the running kernel\necho \"\"\n\
    echo \"3. Applying to running kernel...\"\nsysctl -w \"$PARAM_NAME=$PARAM_VALUE\"\nif [ $? -eq 0 ]; then\n    echo \"\
    \   [OK] Applied successfully\"\nelse\n    echo \"   [ERROR] Failed to apply kernel parameter\"\n    return 1\nfi\n\n\
    # Verify\necho \"\"\necho \"4. Verification:\"\nNEW_VALUE=$(sysctl -n \"$PARAM_NAME\" 2>/dev/null)\necho \"   $PARAM_NAME\
    \ = $NEW_VALUE\"\n\nif [ \"$NEW_VALUE\" = \"$PARAM_VALUE\" ]; then\n    echo \"\"\n    echo \"[SUCCESS] ASLR is now enabled\
    \ with value $PARAM_VALUE\"\nelse\n    echo \"\"\n    echo \"[ERROR] Failed to set ASLR value\"\n    return 1\nfi"
