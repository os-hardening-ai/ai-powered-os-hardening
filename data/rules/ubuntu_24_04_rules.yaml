  - /etc/sysctl.d/60-netipv6_sysctl.conf
  audit_command: if grep -rqs "^\s*net\.ipv4\.ip_forward\s*=\s*1" /etc/sysctl.conf /etc/sysctl.d/; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S3/3.3/3.3.1/audit.sh
