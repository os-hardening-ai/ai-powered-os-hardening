  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S4/4.3/4.3.8/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS 4.3.8 Ensure nftables default deny firewall policy

    echo "Checking nftables default policies..."

    RULESET=$(nft list ruleset 2>/dev/null)

    INPUT_DROP=$(echo "$RULESET" | grep -c "chain input.*policy drop")
    FORWARD_DROP=$(echo "$RULESET" | grep -c "chain forward.*policy drop")

    if [ "$INPUT_DROP" -gt 0 ] && [ "$FORWARD_DROP" -gt 0 ]; then
        echo "PASS: Default deny policy is configured"
        echo ""
        echo "AUDIT RESULT: PASS"
        exit 0
    else
        echo "WARNING: Default deny may not be configured for all chains"
        echo ""
        echo "AUDIT RESULT: MANUAL - Review nftables policies"
        exit 0
    fi
  remediation_script_content: |-
    #!/bin/bash
    # CIS 4.3.8 Ensure nftables default deny firewall policy

    echo "Applying remediation for CIS 4.3.8..."
    echo "WARNING: Setting default deny - ensure SSH is allowed first!"

    # Allow SSH to prevent lockout
    nft add rule inet filter input tcp dport 22 accept 2>/dev/null

    # Set default policies to drop
    nft 'chain inet filter input { policy drop; }' 2>/dev/null
    nft 'chain inet filter forward { policy drop; }' 2>/dev/null
    # Note: Output policy often left as accept
    nft 'chain inet filter output { policy accept; }' 2>/dev/null

    echo "Remediation complete for CIS 4.3.8"
