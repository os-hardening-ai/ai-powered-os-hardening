- id: 4.2.4
  section: 4.2.4
  category: Logging and Auditing
  title: Ensure ufw loopback traffic is configured
  description: 'Denetim: Loopback incoming not configured'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: if echo "$UFW_STATUS" | grep -qE "Anywhere on lo\s+ALLOW IN"; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S4/4.2/4.2.4/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S4/4.2/4.2.4/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS 4.2.4 Ensure ufw loopback traffic is configured

    echo "Checking ufw loopback configuration..."

    FAIL=0

    # Check for loopback rules
    UFW_STATUS=$(ufw status verbose 2>/dev/null)

    # Check if lo interface is allowed
    if echo "$UFW_STATUS" | grep -qE "Anywhere on lo\s+ALLOW IN"; then
        echo "PASS: Loopback incoming allowed"
    else
        echo "FAIL: Loopback incoming not configured"
        FAIL=1
    fi

    # Check if 127.0.0.0/8 is denied from other interfaces
    if echo "$UFW_STATUS" | grep -qE "DENY IN\s+127\.0\.0\.0/8"; then
        echo "PASS: 127.0.0.0/8 denied from non-loopback"
    else
        echo "WARNING: 127.0.0.0/8 deny rule may not be configured"
    fi

    if [ "$FAIL" -eq 0 ]; then
        echo ""
        echo "AUDIT RESULT: PASS"
        exit 0
    else
        echo ""
        echo "AUDIT RESULT: FAIL"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash
    # CIS 4.2.4 Ensure ufw loopback traffic is configured

    echo "Applying remediation for CIS 4.2.4..."

    # Allow loopback traffic
    ufw allow in on lo
    ufw allow out on lo

    # Deny traffic from loopback addresses on non-loopback interfaces
    ufw deny in from 127.0.0.0/8
    ufw deny in from ::1

    echo "Remediation complete for CIS 4.2.4"
  tags:
  - auditd
  - auditing
  - firewall
  - logging
  - network
  - syslog
  - ufw
