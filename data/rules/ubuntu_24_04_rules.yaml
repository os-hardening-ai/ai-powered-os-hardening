    \ configured correctly\n\necho \"Checking shell timeout configuration...\"\n\noutput1=\"\"\noutput2=\"\"\n\n[ -f /etc/bashrc\
    \ ] && BRC=\"/etc/bashrc\"\n\nfor f in \"$BRC\" /etc/profile /etc/profile.d/*.sh; do\n    [ ! -f \"$f\" ] && continue\n\
    \    \n    grep -Pq '^\\s*([^#]+\\s+)?TMOUT=(900|[1-8][0-9][0-9]|[1-9][0-9]|[1-9])\\b' \"$f\" && \\\n    grep -Pq '^\\\
    s*([^#]+;\\s*)?readonly\\s+TMOUT(\\s+|\\s*;|\\s*$|=(900|[1-8][0-9][0-9]|[1-9][0-9]|[1-9]))\\b' \"$f\" && \\\n    grep\
    \ -Pq '^\\s*([^#]+;\\s*)?export\\s+TMOUT(\\s+|\\s*;|\\s*$|=(900|[1-8][0-9][0-9]|[1-9][0-9]|[1-9]))\\b' \"$f\" && \\\n\
    \    output1=\"$f\"\ndone\n\n# Check for invalid TMOUT values\ngrep -Pq '^\\s*([^#]+\\s+)?TMOUT=(9[0-9][1-9]|9[1-9][0-9]|0+|[1-9]\\\
    d{3,})\\b' /etc/profile /etc/profile.d/*.sh \"$BRC\" 2>/dev/null && \\\noutput2=$(grep -Ps '^\\s*([^#]+\\s+)?TMOUT=(9[0-9][1-9]|9[1-9][0-9]|0+|[1-9]\\\
    d{3,})\\b' /etc/profile /etc/profile.d/*.sh $BRC 2>/dev/null)\n\nif [ -n \"$output1\" ] && [ -z \"$output2\" ]; then\n\
    \    echo \"PASS: TMOUT is configured in: \\\"$output1\\\"\"\n    exit 0\nelse\n    [ -z \"$output1\" ] && echo \"FAIL:\
    \ TMOUT is not configured\"\n    [ -n \"$output2\" ] && echo \"FAIL: TMOUT is incorrectly configured in: \\\"$output2\\\
    \"\"\n    exit 1\nfi"
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.3.2 - Ensure default user shell timeout is configured
    # Configure TMOUT to 900 seconds (15 minutes)

    TMOUT_VALUE=900

    echo "Configuring shell timeout to $TMOUT_VALUE seconds..."

    # Check and fix existing TMOUT settings in profile.d
    for f in /etc/profile.d/*.sh; do
        [ ! -f "$f" ] && continue
        if grep -Pq '^\s*TMOUT=' "$f"; then
            sed -i 's/^\s*TMOUT=.*/#&/' "$f"
            echo "Commented out existing TMOUT in $f"
        fi
    done

    # Comment out TMOUT in /etc/profile if exists
    if [ -f /etc/profile ] && grep -Pq '^\s*TMOUT=' /etc/profile; then
        sed -i 's/^\s*TMOUT=.*/#&/' /etc/profile
        echo "Commented out existing TMOUT in /etc/profile"
    fi

    # Comment out TMOUT in /etc/bashrc if exists
    for brc in /etc/bashrc /etc/bash.bashrc; do
        if [ -f "$brc" ] && grep -Pq '^\s*TMOUT=' "$brc"; then
            sed -i 's/^\s*TMOUT=.*/#&/' "$brc"
            echo "Commented out existing TMOUT in $brc"
        fi
    done

    # Create new TMOUT configuration
    printf '%s\n' \
        "# CIS 5.4.3.2 - Shell timeout configuration" \
        "TMOUT=$TMOUT_VALUE" \
        "readonly TMOUT" \
        "export TMOUT" > /etc/profile.d/50-tmout.sh

    echo "SUCCESS: Shell timeout configured to $TMOUT_VALUE seconds in /etc/profile.d/50-tmout.sh"
  tags:
