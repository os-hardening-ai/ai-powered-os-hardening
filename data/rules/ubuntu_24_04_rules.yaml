- id: 5.4.2.8
  section: 5.4.2
  category: Access Authentication and Authorization
  title: '- Ensure accounts without a valid login shell are locked'
  description: 'Bu kural /etc/shells dosyasinin guvenlik yapilandirmasini denetler. Denetim: The following accounts should
    be locked:'
  level: 1
  auto_remediate: true
  manual_review: false
