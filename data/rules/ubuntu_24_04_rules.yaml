- id: 7.2.9
  section: 7.2.9
  category: Security Patching and Updates
  title: Ensure local interactive user home directories are configured
  description: 'Bu kural /etc/passwd dosyasinin guvenlik yapilandirmasini denetler. Denetim: Home directory $home for user
    $user does not exist'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/passwd
  - /etc/skel/.
  audit_command: owner=$(stat -c "%U" "$home" 2>/dev/null)
  remediation_command: chown -R "$user":"$user" "$home"; chmod 750 "$home"
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.2/7.2.9/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.2/7.2.9/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # 7.2.9 Ensure local interactive user home directories are configured (Automated)

    echo "Checking local interactive user home directories..."

    failed=0

    # Get list of local interactive users (UID >= 1000 and has a shell)
    while IFS=: read -r user uid home shell; do
        if [ "$uid" -ge 1000 ] && [ "$shell" != "/usr/sbin/nologin" ] && [ "$shell" != "/bin/false" ] && [ "$user" != "nobody" ]; then
            # Check if home directory exists
            if [ ! -d "$home" ]; then
                echo "FAIL: Home directory $home for user $user does not exist"
                failed=1
                continue
            fi

            # Check if user owns their home directory
            owner=$(stat -c "%U" "$home" 2>/dev/null)
            if [ "$owner" != "$user" ]; then
                echo "FAIL: Home directory $home is not owned by $user (owned by $owner)"
                failed=1
            fi

            # Check permissions (should be 750 or more restrictive)
            perm=$(stat -c "%a" "$home" 2>/dev/null)
            if [ "$perm" -gt 750 ]; then
                echo "FAIL: Home directory $home has permissions $perm (should be 750 or more restrictive)"
                failed=1
            fi
        fi
    done < <(awk -F: '{print $1":"$3":"$6":"$7}' /etc/passwd)

    if [ $failed -eq 0 ]; then
        echo "PASS: All local interactive user home directories are properly configured"
        exit 0
    else
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # 7.2.9 Ensure local interactive user home directories are configured (Automated)

    echo "Configuring local interactive user home directories..."

    # Get list of local interactive users (UID >= 1000 and has a shell)
    while IFS=: read -r user uid home shell; do
        if [ "$uid" -ge 1000 ] && [ "$shell" != "/usr/sbin/nologin" ] && [ "$shell" != "/bin/false" ] && [ "$user" != "nobody" ]; then
            # Create home directory if it doesn't exist
            if [ ! -d "$home" ]; then
                echo "Creating home directory $home for user $user"
                mkdir -p "$home"
                cp -r /etc/skel/. "$home/"
            fi

            # Set ownership
            echo "Setting ownership of $home to $user"
            chown -R "$user":"$user" "$home"

            # Set permissions
            echo "Setting permissions of $home to 750"
            chmod 750 "$home"
        fi
    done < <(awk -F: '{print $1":"$3":"$6":"$7}' /etc/passwd)

    echo "Local interactive user home directories have been configured"
  tags:
  - home_directory
  - package_management
  - patching
  - updates
  - user_accounts
- id: 7.2.10
  section: 7.2.10
  category: Security Patching and Updates
  title: Ensure local interactive user dot files access is configured
  description: 'Bu kural /etc/passwd dosyasinin guvenlik yapilandirmasini denetler. Denetim: Dot file $file has permissions
    $perm (group or world writable)'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/passwd
  audit_command: perm=$(stat -c "%a" "$file" 2>/dev/null)
  remediation_command: chown "$user":"$user" "$file"; chmod go-w "$file"; chown "$user":"$user" "$home/.netrc"
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.2/7.2.10/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.2/7.2.10/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # 7.2.10 Ensure local interactive user dot files access is configured (Automated)

    echo "Checking local interactive user dot files access..."

    failed=0

    # Get list of local interactive users (UID >= 1000 and has a shell)
    while IFS=: read -r user uid home shell; do
        if [ "$uid" -ge 1000 ] && [ "$shell" != "/usr/sbin/nologin" ] && [ "$shell" != "/bin/false" ] && [ "$user" != "nobody" ]; then
            if [ -d "$home" ]; then
                # Check dot files in home directory
                for file in "$home"/.[!.]*; do
                    if [ -f "$file" ]; then
                        # Check if file is group or world writable
                        perm=$(stat -c "%a" "$file" 2>/dev/null)
                        if [ -n "$perm" ]; then
                            # Get last two digits of permission
                            group_other="${perm: -2}"

                            # Check if group writable (second to last digit has write bit)
                            group_perm="${group_other:0:1}"
                            other_perm="${group_other:1:1}"

                            if [ "$group_perm" -ge 2 ] || [ "$other_perm" -ge 2 ]; then
                                echo "FAIL: Dot file $file has permissions $perm (group or world writable)"
                                failed=1
                            fi
                        fi

                        # Check ownership
                        owner=$(stat -c "%U" "$file" 2>/dev/null)
                        if [ "$owner" != "$user" ]; then
                            echo "FAIL: Dot file $file is owned by $owner instead of $user"
                            failed=1
                        fi
                    fi
                done

                # Check .netrc specifically - should be 600 or more restrictive
                if [ -f "$home/.netrc" ]; then
                    perm=$(stat -c "%a" "$home/.netrc" 2>/dev/null)
                    if [ "$perm" != "600" ] && [ "$perm" != "400" ] && [ "$perm" != "000" ]; then
                        echo "FAIL: .netrc file has permissions $perm (should be 600 or more restrictive)"
                        failed=1
                    fi
                fi
            fi
        fi
    done < <(awk -F: '{print $1":"$3":"$6":"$7}' /etc/passwd)

    if [ $failed -eq 0 ]; then
        echo "PASS: All local interactive user dot files are properly configured"
        exit 0
    else
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # 7.2.10 Ensure local interactive user dot files access is configured (Automated)

    echo "Configuring local interactive user dot files access..."

    # Get list of local interactive users (UID >= 1000 and has a shell)
    while IFS=: read -r user uid home shell; do
        if [ "$uid" -ge 1000 ] && [ "$shell" != "/usr/sbin/nologin" ] && [ "$shell" != "/bin/false" ] && [ "$user" != "nobody" ]; then
            if [ -d "$home" ]; then
                # Fix dot files in home directory
                for file in "$home"/.[!.]*; do
                    if [ -f "$file" ]; then
                        echo "Fixing permissions for $file"

                        # Set ownership to user
                        chown "$user":"$user" "$file"

                        # Remove group and other write permissions
                        chmod go-w "$file"
                    fi
                done

                # Fix .netrc specifically - should be 600
                if [ -f "$home/.netrc" ]; then
                    echo "Setting .netrc to 600"
                    chown "$user":"$user" "$home/.netrc"
                    chmod 600 "$home/.netrc"
                fi
            fi
        fi
    done < <(awk -F: '{print $1":"$3":"$6":"$7}' /etc/passwd)

    echo "Local interactive user dot files access has been configured"
  tags:
  - package_management
  - patching
  - updates
