  audit_command: bad_umask=$(grep -Psi -- '^\h*umask\h+(([0-7][0-7][01][0-7]\b|[0-7][0-7][0-7][0-6]\b)|([0-7][01][0-7]\b|[0-7][0-7][0-6]\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\b)(,o=[rwx]{1,3})?)|((g=[wrx]{1,3},)?o=[wrx]{1,3}\b)))'
    /root/.bash_profile /root/.bashrc 2>/dev/null)
  remediation_command: 'sed -i ''s/^\(\h*umask\h\+.*\)/#\1 # Commented by CIS remediation/'' "$file"'
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.6/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.2/5.4.2.6/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.6 - Ensure root user umask is configured
    # Check root's umask configuration

    echo "Checking root user umask configuration..."

    # Check for permissive umask in root shell files
    bad_umask=$(grep -Psi -- '^\h*umask\h+(([0-7][0-7][01][0-7]\b|[0-7][0-7][0-7][0-6]\b)|([0-7][01][0-7]\b|[0-7][0-7][0-6]\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\b)(,o=[rwx]{1,3})?)|((g=[wrx]{1,3},)?o=[wrx]{1,3}\b)))' /root/.bash_profile /root/.bashrc 2>/dev/null)

    if [ -n "$bad_umask" ]; then
        echo "FAIL: Root has permissive umask configured:"
        echo "$bad_umask"
        exit 1
    fi

    echo "PASS: Root user umask is correctly configured"
    exit 0
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.2.6 - Ensure root user umask is configured
    # Set restrictive umask for root user

    echo "Configuring root user umask..."

    # Files to check
    files="/root/.bash_profile /root/.bashrc"

    for file in $files; do
        if [ -f "$file" ]; then
            # Remove or comment out permissive umask lines
            if grep -Pqi '^\h*umask\h+' "$file"; then
                sed -i 's/^\(\h*umask\h\+.*\)/#\1 # Commented by CIS remediation/' "$file"
                echo "Commented out existing umask in $file"
            fi
        fi
    done

    # Add restrictive umask to .bashrc
    if [ -f /root/.bashrc ]; then
        if ! grep -q "^umask 0027" /root/.bashrc; then
            echo "" >> /root/.bashrc
            echo "# CIS 5.4.2.6 - Restrictive root umask" >> /root/.bashrc
            echo "umask 0027" >> /root/.bashrc
            echo "Added umask 0027 to /root/.bashrc"
        fi
    fi

    echo "SUCCESS: Root user umask configured to 0027"
