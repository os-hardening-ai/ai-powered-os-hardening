  auto_remediate: true
  manual_review: false
  sshd_directive: kexalgorithms
  expected_value: ''
  config_files:
  - /etc/ssh/sshd_config
  audit_command: result=$(sshd -T 2>/dev/null | grep -i '^kexalgorithms')
  remediation_command: sed -i '/^KexAlgorithms\s/d' /etc/ssh/sshd_config; systemctl reload sshd
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.1/5.1.12/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.1/5.1.12/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # Check sshd KexAlgorithms configuration
    weak_kex="diffie-hellman-group1-sha1|diffie-hellman-group14-sha1|diffie-hellman-group-exchange-sha1"
    result=$(sshd -T 2>/dev/null | grep -i '^kexalgorithms')

    if echo "$result" | grep -qE "$weak_kex"; then
        echo "FAIL: Weak key exchange algorithms detected"
        echo "  $result"
        exit 1
    elif [ -z "$result" ]; then
        echo "FAIL: No KexAlgorithms configured"
        exit 1
    else
        echo "PASS: KexAlgorithms configured"
        echo "  $result"
        exit 0
    fi
  remediation_script_content: |-
    #!/bin/bash

    # Remediate sshd KexAlgorithms configuration
    echo "Configuring sshd KexAlgorithms..."

    # Remove any existing KexAlgorithms directive
    sed -i '/^KexAlgorithms\s/d' /etc/ssh/sshd_config

    # Add strong KexAlgorithms directive
    echo "KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group14-sha256,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512,ecdh-sha2-nistp521,ecdh-sha2-nistp384,ecdh-sha2-nistp256,diffie-hellman-group-exchange-sha256" >> /etc/ssh/sshd_config

    # Reload sshd
    systemctl reload sshd

    echo "SUCCESS: Strong key exchange algorithms configured"
  tags:
  - access_control
  - authentication
  - authorization
  - ssh
