  - initial_setup
  - kernel_module
  - password
- id: 1.4.2
  section: 1.4.2
  category: Initial Setup and Filesystem Configuration
  title: Ensure permissions on bootloader config are configured
  description: 'Denetim: Access: (0600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root)'
  level: 1
  auto_remediate: true
  manual_review: false
  audit_command: 'FILE_STATS=$(stat -Lc ''Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)'' "$GRUB_CFG" 2>/dev/null)'
  remediation_command: if chown root:root "$GRUB_CFG"; then; if chmod u-x,go-rwx "$GRUB_CFG"; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.4/1.4.2/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.4/1.4.2/remediation.sh
  audit_script_content: "#!/bin/bash\n\n# 1.4.2 Ensure permissions on bootloader config are configured (Automated)\n# Description:\
    \ The grub configuration file contains information on boot settings \n# and passwords for unlocking boot options.\n# Rationale:\
    \ Setting the permissions to read and write for root only prevents \n# non-root users from seeing the boot parameters\
    \ or changing them. Non-root users \n# who read the boot parameters may be able to identify weaknesses in security \n\
    # upon boot and be able to exploit them.\n\necho \"=== 1.4.2 Bootloader Config Permissions Check ===\"\necho \"\"\n\n\
    # Color codes\nRED='\\033[0;31m'\nGREEN='\\033[0;32m'\nYELLOW='\\033[1;33m'\nNC='\\033[0m' # No Color\n\n# Variables\n\
    GRUB_CFG=\"/boot/grub/grub.cfg\"\nPASSED=0\nFAILED=0\n\n# Check if GRUB configuration file exists\nif [ ! -f \"$GRUB_CFG\"\
    \ ]; then\n    echo -e \"${RED}[FAIL]${NC} GRUB configuration file not found: $GRUB_CFG\"\n    echo \"Note: GRUB2 may\
    \ not be installed on your system or may be in a different location.\"\n    exit 1\nfi\n\necho \"Checking permissions\
    \ on $GRUB_CFG...\"\necho \"Command: stat -Lc 'Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' $GRUB_CFG\"\necho \"\"\n\
    \n# Get file stats\nFILE_STATS=$(stat -Lc 'Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' \"$GRUB_CFG\" 2>/dev/null)\n\
    echo \"Current: $FILE_STATS\"\necho \"Expected: Access: (0600/-rw-------) Uid: ( 0/ root) Gid: ( 0/ root)\"\necho \"\"\
    \n\n# Get individual values\nPERMISSIONS=$(stat -Lc '%a' \"$GRUB_CFG\" 2>/dev/null)\nOWNER_UID=$(stat -Lc '%u' \"$GRUB_CFG\"\
    \ 2>/dev/null)\nGROUP_GID=$(stat -Lc '%g' \"$GRUB_CFG\" 2>/dev/null)\n\n# Check 1: Verify Uid is 0 (root)\necho \"1. Owner\
    \ (Uid) Check:\"\nif [ \"$OWNER_UID\" == \"0\" ]; then\n    echo -e \"   ${GREEN}[PASS]${NC} Owner is root (Uid: 0)\"\n\
    \    ((PASSED++))\nelse\n    echo -e \"   ${RED}[FAIL]${NC} Owner is not root (Uid: $OWNER_UID)\"\n    ((FAILED++))\n\
    fi\n\n# Check 2: Verify Gid is 0 (root)\necho \"\"\necho \"2. Group (Gid) Check:\"\nif [ \"$GROUP_GID\" == \"0\" ]; then\n\
    \    echo -e \"   ${GREEN}[PASS]${NC} Group is root (Gid: 0)\"\n    ((PASSED++))\nelse\n    echo -e \"   ${RED}[FAIL]${NC}\
    \ Group is not root (Gid: $GROUP_GID)\"\n    ((FAILED++))\nfi\n\n# Check 3: Verify permissions are 0600 or more restrictive\n\
    echo \"\"\necho \"3. Permissions Check:\"\n# Permissions should be 0600 or more restrictive (0400, 0000)\nif [ \"$PERMISSIONS\"\
    \ == \"600\" ] || [ \"$PERMISSIONS\" == \"400\" ] || [ \"$PERMISSIONS\" == \"000\" ]; then\n    echo -e \"   ${GREEN}[PASS]${NC}\
    \ Permissions are correctly set ($PERMISSIONS)\"\n    ((PASSED++))\nelse\n    echo -e \"   ${RED}[FAIL]${NC} Permissions\
    \ are too permissive ($PERMISSIONS)\"\n    echo \"   Expected: 600 or more restrictive\"\n    ((FAILED++))\nfi\n\necho\
    \ \"\"\necho \"=== Summary ===\"\necho -e \"${GREEN}Successful Checks: $PASSED${NC}\"\necho -e \"${RED}Failed Checks:\
    \ $FAILED${NC}\"\necho \"\"\n\nif [ $FAILED -eq 0 ]; then\n    echo -e \"${GREEN}Result: COMPLIANT${NC}\"\n    echo \"\
    Bootloader configuration permissions are properly set.\"\n    exit 0\nelse\n    echo -e \"${RED}Result: NON-COMPLIANT${NC}\"\
    \n    echo \"Bootloader configuration permissions must be corrected!\"\n    exit 1\nfi"
  remediation_script_content: |-
    #!/bin/bash

    # 1.4.2 Ensure permissions on bootloader config are configured (Automated)
    # Remediation: Set correct ownership and permissions on grub configuration file

    echo "=== 1.4.2 Bootloader Config Permissions Remediation ==="
    echo ""

    # Check possible GRUB config locations
    GRUB_CFG=""
    for cfg in "/boot/grub/grub.cfg" "/boot/grub2/grub.cfg" "/boot/efi/EFI/*/grub.cfg"; do
        if [ -f "$cfg" ]; then
            GRUB_CFG="$cfg"
            break
        fi
    done

    # Check if GRUB configuration file exists
    if [ -z "$GRUB_CFG" ] || [ ! -f "$GRUB_CFG" ]; then
        echo "[WARNING] GRUB configuration file not found"
        echo "Checked: /boot/grub/grub.cfg, /boot/grub2/grub.cfg"
        echo "Note: GRUB2 may not be installed or configured differently"
        return 0  # Not an error, might be a different bootloader
    fi

    echo "Found GRUB config: $GRUB_CFG"
    echo ""
    echo "Current permissions:"
    stat -Lc 'Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' "$GRUB_CFG"
    echo ""

    echo "Applying remediation..."
    echo ""

    # Set ownership to root:root
    echo "1. Setting ownership to root:root..."
    if chown root:root "$GRUB_CFG"; then
        echo "   [OK] Ownership set successfully"
    else
        echo "   [ERROR] Failed to set ownership"
        return 1
    fi

    # Set permissions to 0600
    echo "2. Setting permissions to 0600..."
    if chmod u-x,go-rwx "$GRUB_CFG"; then
        echo "   [OK] Permissions set successfully"
    else
        echo "   [ERROR] Failed to set permissions"
        return 1
    fi

    echo ""
    echo "New permissions:"
    stat -Lc 'Access: (%#a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' "$GRUB_CFG"
    echo ""
    echo "[SUCCESS] Remediation completed successfully."
  tags:
  - bootloader
  - file_permissions
  - filesystem
  - grub
  - initial_setup
  - kernel_module
