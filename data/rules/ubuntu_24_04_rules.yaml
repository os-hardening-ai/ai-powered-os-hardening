            FAIL=1
        fi
    done

    if [ "$FAIL" -eq 0 ]; then
        echo ""
        echo "AUDIT RESULT: PASS"
        exit 0
    else
        echo ""
        echo "AUDIT RESULT: FAIL"
        exit 1
    fi
