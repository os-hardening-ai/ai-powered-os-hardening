    $current (should be SHA512 or YESCRYPT)'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/login.defs
  audit_command: encrypt_method=$(grep -Pi -- '^\h*ENCRYPT_METHOD\h+(SHA512|yescrypt)\b' /etc/login.defs)
  remediation_command: sed -i "s/^ENCRYPT_METHOD.*/ENCRYPT_METHOD $ENCRYPT_METHOD/" /etc/login.defs
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.1/5.4.1.4/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S5/5.4/5.4.1/5.4.1.4/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # CIS 5.4.1.4 - Ensure strong password hashing algorithm is configured
    # Check ENCRYPT_METHOD in /etc/login.defs

    echo "Checking password hashing algorithm configuration..."

    # Check /etc/login.defs for ENCRYPT_METHOD
    encrypt_method=$(grep -Pi -- '^\h*ENCRYPT_METHOD\h+(SHA512|yescrypt)\b' /etc/login.defs)

    if [ -z "$encrypt_method" ]; then
        current=$(grep -Pi -- '^\h*ENCRYPT_METHOD\h+' /etc/login.defs | awk '{print $2}')
        if [ -n "$current" ]; then
            echo "FAIL: ENCRYPT_METHOD is set to $current (should be SHA512 or YESCRYPT)"
        else
            echo "FAIL: ENCRYPT_METHOD is not set in /etc/login.defs"
        fi
        exit 1
    fi

    echo "PASS: Strong password hashing algorithm is configured"
    echo "$encrypt_method"
    exit 0
  remediation_script_content: |-
    #!/bin/bash

    # CIS 5.4.1.4 - Ensure strong password hashing algorithm is configured
    # Set ENCRYPT_METHOD to YESCRYPT

    ENCRYPT_METHOD="YESCRYPT"

    echo "Setting password hashing algorithm to $ENCRYPT_METHOD..."

    # Update /etc/login.defs
    if grep -q '^ENCRYPT_METHOD' /etc/login.defs; then
        sed -i "s/^ENCRYPT_METHOD.*/ENCRYPT_METHOD $ENCRYPT_METHOD/" /etc/login.defs
    else
        echo "ENCRYPT_METHOD $ENCRYPT_METHOD" >> /etc/login.defs
    fi

    echo "SUCCESS: Password hashing algorithm set to $ENCRYPT_METHOD"
    echo "NOTE: Existing passwords will use the old algorithm until changed."
    echo "NOTE: This setting should be consistent with PAM configuration."
