  config_files:
  - /etc/modprobe.d/
  audit_command: if modprobe -n -v "$MODULE" 2>&1 | grep -qE "install /bin/(true|false)"; then
  remediation_command: '"blacklist $MODULE" > /etc/modprobe.d/${MODULE}.conf; modprobe -r "$MODULE" 2>/dev/null'
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S3/3.2/3.2.4/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S3/3.2/3.2.4/remediation.sh
  audit_script_content: |-
    #!/bin/bash
    # CIS 3.2.4 Ensure sctp kernel module is not available

    MODULE="sctp"

    echo "Checking $MODULE kernel module status..."

    FAIL=0

    # Check if module is disabled (install redirects to /bin/true or /bin/false)
    if modprobe -n -v "$MODULE" 2>&1 | grep -qE "install /bin/(true|false)"; then
        echo "PASS: $MODULE module is disabled"
    else
        echo "FAIL: $MODULE module is not disabled"
        FAIL=1
    fi

    # Check if module is blacklisted
    if grep -rqs "^\s*blacklist\s\+$MODULE\b" /etc/modprobe.d/; then
        echo "PASS: $MODULE module is blacklisted"
    else
        echo "WARNING: $MODULE module is not blacklisted"
    fi

    # Check if module is currently loaded
    if lsmod | grep -q "^$MODULE"; then
        echo "FAIL: $MODULE module is currently loaded"
        FAIL=1
    else
        echo "PASS: $MODULE module is not loaded"
    fi

    if [ "$FAIL" -eq 0 ]; then
        echo ""
        echo "AUDIT RESULT: PASS"
        exit 0
    else
        echo ""
        echo "AUDIT RESULT: FAIL"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash
    # CIS 3.2.4 Ensure sctp kernel module is not available

    MODULE="sctp"

    echo "Applying remediation for CIS 3.2.4..."

    # Create modprobe configuration file
    printf '%s\n' \
        "# CIS 3.2.4 - Disable $MODULE module" \
        "install $MODULE /bin/true" \
        "blacklist $MODULE" > /etc/modprobe.d/${MODULE}.conf

    echo "Created /etc/modprobe.d/${MODULE}.conf"

    # Unload module if currently loaded
    if lsmod | grep -q "^$MODULE"; then
        modprobe -r "$MODULE" 2>/dev/null
        if [ $? -eq 0 ]; then
            echo "Unloaded $MODULE module"
        else
            echo "WARNING: Could not unload $MODULE module (may be in use)"
        fi
    else
        echo "$MODULE module is not currently loaded"
    fi

    echo "Remediation complete for CIS 3.2.4"
