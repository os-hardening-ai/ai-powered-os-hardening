- id: 1.2.1.1
  section: 1.2.1
  category: Initial Setup and Filesystem Configuration
  title: '- Ensure GPG keys are configured'
  description: Bu kural /etc/apt/trusted.gpg.d/ dosyasinin guvenlik yapilandirmasini denetler.
  level: 1
  auto_remediate: false
  manual_review: true
  config_files:
  - /etc/apt/trusted.gpg.d/
  - /etc/apt/sources.list.d/
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.2/1.2.1/1.2.1.1/audit.sh
  remediation_script: null
  audit_script_content: |-
    #!/bin/bash

    # CIS 1.2.1.1 - Ensure GPG keys are configured (Manual)
    # This script checks for GPG keys in the apt trusted directories

    echo "Checking GPG keys for package manager..."
    echo ""

    gpg_keys_found=0

    # Check for GPG/ASC files in trusted.gpg.d and sources.list.d
    for file in /etc/apt/trusted.gpg.d/*.{gpg,asc} /etc/apt/sources.list.d/*.{gpg,asc}; do
        if [ -f "$file" ]; then
            gpg_keys_found=1
            echo "File: $file"
            gpg --list-packets "$file" 2>/dev/null | awk '/keyid/ && !seen[$NF]++ {print "  keyid:", $NF}'
            gpg --list-packets "$file" 2>/dev/null | awk '/Signed-By:/ {print "  signed-by:", $NF}'
            echo ""
        fi
    done

    # Also check the deprecated apt-key list (for backwards compatibility)
    if command -v apt-key >/dev/null 2>&1; then
        echo "Legacy apt-key list (deprecated):"
        apt-key list 2>/dev/null | grep -E "^pub|uid" || true
        echo ""
    fi

    if [ $gpg_keys_found -eq 0 ]; then
        echo "WARNING: No GPG keys found in /etc/apt/trusted.gpg.d/ or /etc/apt/sources.list.d/"
        echo "This requires MANUAL REVIEW to verify GPG keys are configured IAW site policy"
        exit 1
    fi

    echo "GPG keys found. MANUAL REVIEW REQUIRED to verify configuration IAW site policy."
    exit 0
  remediation_script_content: null
  tags:
  - filesystem
  - initial_setup
  - kernel_module
- id: 1.2.1.2
  section: 1.2.1
  category: Initial Setup and Filesystem Configuration
  title: '- Ensure package manager repositories are configured'
  description: Bu kural /etc/apt/sources.list dosyasinin guvenlik yapilandirmasini denetler.
  level: 1
  auto_remediate: false
  manual_review: true
  config_files:
  - /etc/apt/sources.list
  - /etc/apt/sources.list.d
  - /etc/apt/sources.list.d/
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.2/1.2.1/1.2.1.2/audit.sh
  remediation_script: null
  audit_script_content: |-
    #!/bin/bash

    # CIS 1.2.1.2 - Ensure package manager repositories are configured (Manual)
    # This script displays configured package repositories for manual verification

    echo "Checking package manager repository configuration..."
    echo ""
    echo "==================================================================="
    echo "Configured Package Repositories:"
    echo "==================================================================="
    echo ""

    # Display apt repository configuration
    if command -v apt-cache >/dev/null 2>&1; then
        apt-cache policy
        echo ""
    else
        echo "ERROR: apt-cache command not found"
        exit 1
    fi

    echo "==================================================================="
    echo "Repository Sources Files:"
    echo "==================================================================="
    echo ""

    # Show sources.list
    if [ -f /etc/apt/sources.list ]; then
        echo "File: /etc/apt/sources.list"
        grep -v "^#" /etc/apt/sources.list | grep -v "^$" || echo "  (no active entries)"
        echo ""
    fi

    # Show sources.list.d entries
    if [ -d /etc/apt/sources.list.d ]; then
        echo "Additional repository files in /etc/apt/sources.list.d/:"
        for file in /etc/apt/sources.list.d/*.list; do
            if [ -f "$file" ]; then
                echo "  File: $file"
                grep -v "^#" "$file" | grep -v "^$" | sed 's/^/    /' || echo "    (no active entries)"
                echo ""
            fi
        done
    fi

    echo "==================================================================="
    echo "MANUAL REVIEW REQUIRED"
    echo "==================================================================="
    echo ""
    echo "Please verify that:"
    echo "1. All repositories are official and trusted sources"
    echo "2. Repositories are configured according to site policy"
    echo "3. Security update repositories are enabled"
    echo "4. No unauthorized or rogue repositories are present"
    echo ""
    echo "This check requires manual verification against site policy."
    echo ""

    # Exit with 0 as this is informational and requires manual review
    exit 0
  remediation_script_content: null
  tags:
  - filesystem
  - initial_setup
  - kernel_module
  - package_management
- id: 1.2.2.1
  section: 1.2.2
  category: Initial Setup and Filesystem Configuration
  title: '- Ensure updates, patches, and additional security software are installed'
  description: 'CIS Benchmark kurali: - Ensure updates, patches, and additional security software are installed'
  level: 1
  auto_remediate: false
  manual_review: true
  audit_command: upgradable_count=$(echo "$upgrade_output" | grep -E "^[0-9]+ upgraded" | awk '{print $1}')
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.2/1.2.2/1.2.2.1/audit.sh
  remediation_script: null
  audit_script_content: |-
    #!/bin/bash

    # CIS 1.2.2.1 - Ensure updates, patches, and additional security software are installed (Manual)
    # This script checks for available updates and patches

    echo "Checking for available updates and patches..."
    echo ""

    # Update package lists
    echo "==================================================================="
    echo "Updating package lists..."
    echo "==================================================================="
    apt update 2>&1 | tail -20
    echo ""

    # Check for available upgrades (simulation mode)
    echo "==================================================================="
    echo "Checking for available upgrades (simulation mode)..."
    echo "==================================================================="
    echo ""

    upgrade_output=$(apt -s upgrade 2>&1)
    echo "$upgrade_output"
    echo ""

    # Count packages that can be upgraded
    upgradable_count=$(echo "$upgrade_output" | grep -E "^[0-9]+ upgraded" | awk '{print $1}')

    if [ -z "$upgradable_count" ]; then
        upgradable_count=0
    fi

    echo "==================================================================="
    echo "Summary:"
    echo "==================================================================="

    if [ "$upgradable_count" -eq 0 ]; then
        echo "✓ No updates or patches available"
        echo "  System is up to date"
        echo ""
        exit 0
    else
        echo "⚠ $upgradable_count package(s) can be upgraded"
        echo ""
        echo "MANUAL REVIEW REQUIRED:"
        echo "  - Review the list of available updates above"
        echo "  - Verify updates comply with site policy"
        echo "  - Test updates if required by organizational policy"
        echo "  - Schedule installation according to change management procedures"
        echo ""
        exit 1
    fi
  remediation_script_content: null
  tags:
  - filesystem
  - initial_setup
  - kernel_module
  - patching
  - updates
