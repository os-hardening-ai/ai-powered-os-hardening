  section: 1.7.10
  category: Initial Setup and Filesystem Configuration
  title: for XDMCP enabled in GDM configuration files
  description: 'Bu kural /etc/gdm3/custom.conf dosyasinin guvenlik yapilandirmasini denetler. Denetim: XDMCP is enabled in
    $config_file'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/gdm3/custom.conf
  - /etc/gdm3/daemon.conf
  - /etc/gdm/custom.conf
  - /etc/gdm/daemon.conf
  audit_command: if ! dpkg-query -W -f='${db:Status-Status}' gdm3 2>/dev/null | grep -q "installed"; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.7/1.7.10/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.7/1.7.10/remediation.sh
  audit_script_content: "#!/bin/bash\n# CIS Benchmark 1.7.10 - Ensure XDMCP is not enabled\n# Audit Script\n\naudit_passed=true\n\
    \necho \"Checking XDMCP configuration...\"\n\n# First check if GDM is installed\nif ! dpkg-query -W -f='${db:Status-Status}'\
    \ gdm3 2>/dev/null | grep -q \"installed\"; then\n    echo \"INFO: GDM (gdm3) is not installed\"\n    echo \"      This\
    \ check is not applicable if GDM is not installed\"\n    echo \"\"\n    echo \"AUDIT RESULT: PASS - GDM is not installed\
    \ (not applicable)\"\n    exit 0\nfi\n\necho \"GDM is installed, checking XDMCP configuration...\"\necho \"\"\n\n# Check\
    \ for XDMCP enabled in GDM configuration files\nxdmcp_enabled=false\n\nfor config_file in /etc/gdm3/custom.conf /etc/gdm3/daemon.conf\
    \ /etc/gdm/custom.conf /etc/gdm/daemon.conf; do\n    if [ -f \"$config_file\" ]; then\n        # Check if [xdmcp] block\
    \ exists and Enable=true is set\n        result=$(awk '/\\[xdmcp\\]/{ f = 1;next } /\\[/{ f = 0 } f {if (/^\\s*Enable\\\
    s*=\\s*true/) print $0}' \"$config_file\" 2>/dev/null)\n        \n        if [ -n \"$result\" ]; then\n            echo\
    \ \"FAIL: XDMCP is enabled in $config_file\"\n            echo \"      Found: $result\"\n            xdmcp_enabled=true\n\
    \            audit_passed=false\n        fi\n    fi\ndone\n\nif [ \"$xdmcp_enabled\" = false ]; then\n    echo \"PASS:\
    \ XDMCP is not enabled in any GDM configuration file\"\nfi\n\n# Final result\necho \"\"\nif [ \"$audit_passed\" = true\
    \ ]; then\n    echo \"AUDIT RESULT: PASS - XDMCP is not enabled\"\n    exit 0\nelse\n    echo \"AUDIT RESULT: FAIL - XDMCP\
    \ is enabled and should be disabled\"\n    exit 1\nfi"
  remediation_script_content: "#!/bin/bash\n# CIS Benchmark 1.7.10 - Ensure XDMCP is not enabled\n# Remediation Script\n\n\
    echo \"Applying remediation for CIS 1.7.10 - Ensure XDMCP is not enabled...\"\n\n# First check if GDM is installed\nif\
    \ ! dpkg-query -W -f='${db:Status-Status}' gdm3 2>/dev/null | grep -q \"installed\"; then\n    echo \"INFO: GDM (gdm3)\
    \ is not installed\"\n    echo \"      No action needed - this rule is not applicable\"\n    return 0\nfi\n\necho \"GDM\
    \ is installed, checking and disabling XDMCP...\"\n\n# Check and fix each configuration file\nfiles_modified=0\n\nfor\
    \ config_file in /etc/gdm3/custom.conf /etc/gdm3/daemon.conf /etc/gdm/custom.conf /etc/gdm/daemon.conf; do\n    if [ -f\
    \ \"$config_file\" ]; then\n        # Check if [xdmcp] block with Enable=true exists\n        if grep -Pziq '\\[xdmcp\\\
    ][^\\[]*Enable\\s*=\\s*true' \"$config_file\" 2>/dev/null; then\n            echo \"Found XDMCP enabled in $config_file,\
    \ disabling...\"\n            \n            # Comment out Enable=true in [xdmcp] block\n            # Use awk to process\
    \ the file\n            awk '\n                /\\[xdmcp\\]/ { in_xdmcp = 1 }\n                /^\\[/ && !/\\[xdmcp\\\
    ]/ { in_xdmcp = 0 }\n                in_xdmcp && /^\\s*Enable\\s*=\\s*true/ { \n                    print \"# \" $0 \"\
    \ # Disabled by CIS remediation\"\n                    next\n                }\n                { print }\n          \
    \  ' \"$config_file\" > \"${config_file}.tmp\" && mv \"${config_file}.tmp\" \"$config_file\"\n            \n         \
    \   echo \"Disabled XDMCP in $config_file\"\n            ((files_modified++))\n        else\n            echo \"INFO:\
    \ XDMCP is not enabled in $config_file\"\n        fi\n    fi\ndone\n\nif [ \"$files_modified\" -eq 0 ]; then\n    echo\
    \ \"No changes needed - XDMCP was not enabled in any configuration file\"\nelse\n    echo \"\"\n    echo \"$files_modified\
    \ file(s) were modified\"\n    echo \"\"\n    echo \"NOTE: You may need to restart GDM for changes to take effect:\"\n\
    \    echo \"      systemctl restart gdm3\"\nfi\n\necho \"\"\necho \"Remediation complete for CIS 1.7.10 - Ensure XDMCP\
    \ is not enabled\""
