        FAIL=1
    fi

    # Check if cron is active
    if systemctl is-active cron 2>/dev/null | grep -q '^active'; then
        echo "PASS: cron is active"
    else
        echo "FAIL: cron is not active"
        FAIL=1
    fi

    if [ "$FAIL" -eq 0 ]; then
