  - filesystem
  - initial_setup
  - kernel_module
- id: 1.4.1
  section: 1.4.1
  category: Initial Setup and Filesystem Configuration
  title: Ensure bootloader password is set
  description: 'Bu kural /etc/grub.d/40_custom dosyasinin guvenlik yapilandirmasini denetler. Denetim: location: /boot/grub/grub.cfg
    or /boot/grub2/grub.cfg'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - /etc/grub.d/40_custom
  - /etc/grub.d/40_custom_password
  audit_command: PASSWORD_LINES=$(grep -E "^[[:space:]]*password" "$GRUB_CFG" 2>/dev/null)
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.4/1.4.1/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S1/1.4/1.4.1/remediation.sh
  audit_script_content: "#!/bin/bash\n\n# CIS Ubuntu 24.04 Benchmark\n# 1.4.1 Ensure bootloader password is set (Automated)\n\
    # Profile: Level 1 - Server, Level 1 - Workstation\n\n# Color codes for output\nRED='\\033[0;31m'\nGREEN='\\033[0;32m'\n\
    YELLOW='\\033[1;33m'\nNC='\\033[0m' # No Color\n\n# Initialize counters\nPASSED=0\nFAILED=0\n\necho \"======================================\"\
    \necho \"CIS 1.4.1 - Bootloader Password Audit\"\necho \"======================================\"\necho \"\"\n\n# Detect\
    \ GRUB configuration file location\nif [ -f \"/boot/grub/grub.cfg\" ]; then\n    GRUB_CFG=\"/boot/grub/grub.cfg\"\nelif\
    \ [ -f \"/boot/grub2/grub.cfg\" ]; then\n    GRUB_CFG=\"/boot/grub2/grub.cfg\"\nelse\n    echo -e \"${RED}[FAIL]${NC}\
    \ GRUB configuration file not found\"\n    echo \"Expected location: /boot/grub/grub.cfg or /boot/grub2/grub.cfg\"\n \
    \   echo \"This system may not use GRUB bootloader\"\n    exit 1\nfi\n\necho \"Using GRUB config: $GRUB_CFG\"\necho \"\
    \"\n\n# Check 1: Superuser configuration\necho \"Check 1: Superuser Configuration\"\necho \"---------------------------------------\"\
    \n\nSUPERUSER_LINE=$(grep \"^set superusers\" \"$GRUB_CFG\" 2>/dev/null)\n\nif [ -n \"$SUPERUSER_LINE\" ]; then\n    #\
    \ Extract username from the line\n    SUPERUSER=$(echo \"$SUPERUSER_LINE\" | sed 's/^set superusers=\"\\(.*\\)\"/\\1/')\n\
    \    \n    if [ -n \"$SUPERUSER\" ]; then\n        echo -e \"${GREEN}[PASS]${NC} Superuser is configured\"\n        echo\
    \ \"  Found: $SUPERUSER_LINE\"\n        ((PASSED++))\n    else\n        echo -e \"${RED}[FAIL]${NC} Superuser is defined\
    \ but empty\"\n        echo \"  Found: $SUPERUSER_LINE\"\n        ((FAILED++))\n    fi\nelse\n    echo -e \"${RED}[FAIL]${NC}\
    \ No superuser configured\"\n    echo \"  Expected: set superusers=\\\"<username>\\\"\"\n    ((FAILED++))\nfi\n\necho\
    \ \"\"\n\n# Check 2: Password hash configuration\necho \"Check 2: Password Hash Configuration\"\necho \"---------------------------------------\"\
    \n\n# Fixed regex: Use grep -E for extended regex or escape properly\n# Look for lines starting with optional spaces,\
    \ then \"password\"\nPASSWORD_LINES=$(grep -E \"^[[:space:]]*password\" \"$GRUB_CFG\" 2>/dev/null)\n\nif [ -n \"$PASSWORD_LINES\"\
    \ ]; then\n    # Check if it's PBKDF2 encrypted\n    if echo \"$PASSWORD_LINES\" | grep -q \"password_pbkdf2\"; then\n\
    \        echo -e \"${GREEN}[PASS]${NC} PBKDF2 password hash found\"\n        \n        # Show only the password type and\
    \ username, not the full hash\n        echo \"$PASSWORD_LINES\" | while IFS= read -r line; do\n            # Extract username\
    \ from password line\n            PASSWORD_USER=$(echo \"$line\" | awk '{print $2}')\n            echo \"  User: $PASSWORD_USER\
    \ (PBKDF2-SHA512)\"\n        done\n        \n        ((PASSED++))\n    else\n        echo -e \"${YELLOW}[WARN]${NC} Password\
    \ found but not using PBKDF2\"\n        echo \"$PASSWORD_LINES\" | sed 's/^/  /'\n        echo \"  Recommendation: Use\
    \ grub-mkpasswd-pbkdf2 for strong encryption\"\n        ((FAILED++))\n    fi\nelse\n    echo -e \"${RED}[FAIL]${NC} No\
    \ password configured\"\n    echo \"  Expected: password_pbkdf2 <username> <hash>\"\n    ((FAILED++))\nfi\n\necho \"\"\
    \n\n# Additional check: Verify superuser and password user match\nif [ -n \"$SUPERUSER\" ] && [ -n \"$PASSWORD_LINES\"\
    \ ]; then\n    PASSWORD_USER=$(echo \"$PASSWORD_LINES\" | grep \"password_pbkdf2\" | head -1 | awk '{print $2}')\n   \
    \ \n    if [ \"$SUPERUSER\" = \"$PASSWORD_USER\" ]; then\n        echo -e \"${GREEN}[INFO]${NC} Superuser and password\
    \ user match: $SUPERUSER\"\n    else\n        echo -e \"${YELLOW}[WARN]${NC} Superuser ($SUPERUSER) and password user\
    \ ($PASSWORD_USER) mismatch\"\n        echo \"  This may cause authentication issues\"\n    fi\n    echo \"\"\nfi\n\n\
    # Summary\necho \"======================================\"\necho \"Summary\"\necho \"======================================\"\
    \necho -e \"Passed checks: ${GREEN}$PASSED${NC}\"\necho -e \"Failed checks: ${RED}$FAILED${NC}\"\necho \"\"\n\nif [ $FAILED\
    \ -eq 0 ]; then\n    echo -e \"${GREEN}[COMPLIANT]${NC} Bootloader password is properly configured\"\n    exit 0\nelse\n\
    \    echo -e \"${RED}[NON-COMPLIANT]${NC} Bootloader password must be configured\"\n    echo \"\"\n    echo \"Remediation\
    \ required:\"\n    echo \"1. Create encrypted password: grub-mkpasswd-pbkdf2\"\n    echo \"2. Add configuration to /etc/grub.d/40_custom\"\
    \n    echo \"3. Run: update-grub (Debian/Ubuntu) or grub2-mkconfig (RHEL/CentOS)\"\n    exit 1\nfi"
  remediation_script_content: |-
    #!/bin/bash

    # CIS Ubuntu 24.04 Benchmark
    # 1.4.1 Ensure bootloader password is set (Automated)
    # Remediation Script - Non-Interactive Version
    #
    # NOTE: This rule requires manual intervention to set a GRUB password.
    # The script checks current status and provides instructions.
    # For security reasons, passwords cannot be set non-interactively.

    echo "==========================================="
    echo "CIS 1.4.1 - Bootloader Password Status"
    echo "==========================================="
    echo ""

    # Detect GRUB config location
    GRUB_CFG=""
    for cfg in "/boot/grub/grub.cfg" "/boot/grub2/grub.cfg"; do
        if [ -f "$cfg" ]; then
            GRUB_CFG="$cfg"
            break
        fi
    done

    if [ -z "$GRUB_CFG" ]; then
        echo "[WARNING] GRUB configuration file not found"
        echo "This system may use a different bootloader"
        return 0
    fi

    # Check if password is already configured
    if grep -q "^set superusers=" "$GRUB_CFG" 2>/dev/null && \
       grep -q "^password_pbkdf2" "$GRUB_CFG" 2>/dev/null; then
        echo "[PASS] Bootloader password is already configured"
        echo ""
        echo "Current configuration:"
        grep "^set superusers=" "$GRUB_CFG" | head -1
        echo "(password hash exists)"
        return 0
    fi

    # Password not configured - provide instructions
    echo "[FAIL] Bootloader password is NOT configured"
    echo ""
    echo "╔══════════════════════════════════════════════════════════════════╗"
    echo "║                    MANUAL ACTION REQUIRED                        ║"
    echo "╚══════════════════════════════════════════════════════════════════╝"
    echo ""
    echo "This rule requires setting a GRUB bootloader password interactively."
    echo "For security reasons, this cannot be automated without user input."
    echo ""
    echo "To configure manually, run these commands:"
    echo ""
    echo "  1. Generate password hash:"
    echo "     sudo grub-mkpasswd-pbkdf2"
    echo ""
    echo "  2. Create configuration file:"
    echo "     sudo nano /etc/grub.d/40_custom_password"
    echo ""
    echo "  3. Add the following (replace values with your own):"
    echo "     #!/bin/sh"
    echo "     exec tail -n +3 \$0"
    echo "     set superusers=\"grubadmin\""
    echo "     password_pbkdf2 grubadmin <your-hash-here>"
    echo ""
    echo "  4. Make executable and update GRUB:"
    echo "     sudo chmod 755 /etc/grub.d/40_custom_password"
    echo "     sudo update-grub"
    echo ""
    echo "  5. Test by rebooting and pressing 'e' in GRUB menu"
    echo ""
    echo "WARNING: Store your password securely! If forgotten, you may need"
    echo "         a Live CD/USB to recover access to your system."
    echo ""

    # Return failure to indicate remediation is needed
    return 1
  tags:
  - authentication
  - bootloader
