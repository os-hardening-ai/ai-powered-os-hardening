  - /etc/group
  - /etc/group...
  audit_command: if ! grep -q "^[^:]*:[^:]*:$gid:" /etc/group; then
  audit_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.2/7.2.3/audit.sh
  remediation_script: KURALLAR/KURALLAR/platforms/linux/ubuntu/desktop/rules/S7/7.2/7.2.3/remediation.sh
  audit_script_content: |-
    #!/bin/bash

    # 7.2.3 Ensure all groups in /etc/passwd exist in /etc/group (Automated)

    echo "Checking if all groups in /etc/passwd exist in /etc/group..."

    # Check for groups in /etc/passwd that don't exist in /etc/group
    missing_groups=""
    for gid in $(awk -F: '{print $4}' /etc/passwd | sort -u); do
        if ! grep -q "^[^:]*:[^:]*:$gid:" /etc/group; then
            missing_groups="$missing_groups\nGID $gid"
        fi
    done

    if [ -z "$missing_groups" ]; then
        echo "PASS: All groups in /etc/passwd exist in /etc/group"
        exit 0
    else
        echo "FAIL: Found groups in /etc/passwd that don't exist in /etc/group:"
        echo -e "$missing_groups"
        exit 1
    fi
  remediation_script_content: |-
    #!/bin/bash

    # 7.2.3 Ensure all groups in /etc/passwd exist in /etc/group (Automated)

    echo "Creating missing groups..."

    # Create missing groups
    for gid in $(awk -F: '{print $4}' /etc/passwd | sort -u); do
        if ! grep -q "^[^:]*:[^:]*:$gid:" /etc/group; then
            echo "Creating group with GID $gid"
            groupadd -g "$gid" "group$gid"
        fi
    done

    echo "All missing groups have been created"
