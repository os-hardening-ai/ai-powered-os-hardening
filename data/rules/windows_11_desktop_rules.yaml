    }"
  remediation_script_content: "# CIS 1.1.6 Remediation - Ensure 'Relax minimum password length limits' is set to 'Enabled'\n\
    \n#Requires -RunAsAdministrator\n\nWrite-Output \"[REMEDIATE] Applying rule 1.1.6...\"\n\ntry {\nif (-not (Test-Path 'HKLM:\\\
    System\\CurrentControlSet\\Control\\SAM')) {\n    New-Item -Path 'HKLM:\\System\\CurrentControlSet\\Control\\SAM' -Force\
    \ | Out-Null\n}\nSet-ItemProperty -Path 'HKLM:\\System\\CurrentControlSet\\Control\\SAM' -Name 'RelaxMinimumPasswordLengthLimits'\
    \ -Value 1 -Type DWord -Force\n    Write-Output \"[SUCCESS] Rule 1.1.6: Applied\"\n} catch {\n    Write-Output \"[ERROR]\
    \ Rule 1.1.6: $($_.Exception.Message)\"\n    exit 1\n}"
