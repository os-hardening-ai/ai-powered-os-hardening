  audit_script_content: "# CIS 1.1.3 Audit - Ensure 'Minimum password age' is set to '1 or more day(s)'\n# Exit codes: 0=PASS,\
    \ 1=FAIL, 2=NOT_APPLICABLE\n\n#Requires -RunAsAdministrator\n\n$auditResult = & {\ntry {\n    $output = net accounts 2>&1\n\
    \    $minAgeLine = $output | Select-String 'Minimum password age'\n    if ($minAgeLine) {\n        $value = [int](($minAgeLine\
    \ -replace '.*:\\s*', '').Trim() -replace '[^0-9]', '')\n        return ($value -ge 1)\n    }\n    return $false\n} catch\
    \ {\n    return $false\n}\n}\n\nif ($auditResult -eq $true) {\n    Write-Output \"[PASS] Rule 1.1.3: Compliant\"\n   \
    \ exit 0\n} elseif ($null -eq $auditResult) {\n    Write-Output \"[INFO] Rule 1.1.3: Not applicable on this system\"\n\
    \    exit 2\n} else {\n    Write-Output \"[FAIL] Rule 1.1.3: Not compliant\"\n    exit 1\n}"
  remediation_script_content: "# CIS 1.1.3 Remediation - Ensure 'Minimum password age' is set to '1 or more day(s)'\n\n#Requires\
    \ -RunAsAdministrator\n\nWrite-Output \"[REMEDIATE] Applying rule 1.1.3...\"\n\ntry {\n$seceditExport = \"$env:TEMP\\\
    secpol_export.cfg\"\n$seceditImport = \"$env:TEMP\\secpol_import.cfg\"\nsecedit /export /cfg $seceditExport /quiet\n$content\
