- id: 18.1.1.1
  section: 18.1.1
  category: Administrative Templates
  title: Ensure 'Prevent enabling lock screen camera' is set to 'Enabled'
  description: This policy setting configures an Administrative Template or MSS Legacy registry key.
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization
  audit_command: $val = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization' -Name 'NoLockScreenCamera'
    -ErrorAction SilentlyContinue).'NoLockScreenCamera'; return ($val -eq 1)
  remediation_command: if (-not (Test-Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization')) { New-Item -Path
    'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization' -Force -ErrorAction SilentlyContinue }; S
  audit_script: KURALLAR/KURALLAR/platforms/windows/rules/S18_Administrative_Templates/18.1.1.1/audit.ps1
  remediation_script: KURALLAR/KURALLAR/platforms/windows/rules/S18_Administrative_Templates/18.1.1.1/remediation.ps1
  audit_script_content: "# CIS 18.1.1.1 Audit - Ensure 'Prevent enabling lock screen camera' is set to 'Enabled'\n# Exit codes:\
    \ 0=PASS, 1=FAIL, 2=NOT_APPLICABLE\n\n#Requires -RunAsAdministrator\n\n$auditResult = & {\n$val = (Get-ItemProperty -Path\
    \ 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\Personalization' -Name 'NoLockScreenCamera' -ErrorAction SilentlyContinue).'NoLockScreenCamera';\
    \ return ($val -eq 1)\n}\n\nif ($auditResult -eq $true) {\n    Write-Output \"[PASS] Rule 18.1.1.1: Compliant\"\n    exit\
    \ 0\n} elseif ($null -eq $auditResult) {\n    Write-Output \"[INFO] Rule 18.1.1.1: Not applicable on this system\"\n \
    \   exit 2\n} else {\n    Write-Output \"[FAIL] Rule 18.1.1.1: Not compliant\"\n    exit 1\n}"
  remediation_script_content: "# CIS 18.1.1.1 Remediation - Ensure 'Prevent enabling lock screen camera' is set to 'Enabled'\n\
    \n#Requires -RunAsAdministrator\n\nWrite-Output \"[REMEDIATE] Applying rule 18.1.1.1...\"\n\ntry {\nif (-not (Test-Path\
    \ 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\Personalization')) { New-Item -Path 'HKLM:\\SOFTWARE\\Policies\\Microsoft\\\
    Windows\\Personalization' -Force -ErrorAction SilentlyContinue }; Set-ItemProperty -Path 'HKLM:\\SOFTWARE\\Policies\\\
    Microsoft\\Windows\\Personalization' -Name 'NoLockScreenCamera' -Value 1 -Type DWord -Force\n    Write-Output \"[SUCCESS]\
    \ Rule 18.1.1.1: Applied\"\n} catch {\n    Write-Output \"[ERROR] Rule 18.1.1.1: $($_.Exception.Message)\"\n    exit 1\n\
    }"
  tags:
  - admin-templates
  - cis
  - registry
  - level-1
  registry_path: HKLM:\SOFTWARE\Policies\Microsoft\Windows\Personalization
  registry_value: NoLockScreenCamera
