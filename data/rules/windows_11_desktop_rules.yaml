    \ -Path 'HKLM:\\System\\CurrentControlSet\\Control\\SAM' -Name 'RelaxMinimumPasswordLengthLimits' -ErrorAction SilentlyContinue).RelaxMinimumPasswordLengthLimits\n\
    \    return ($value -eq 1)\n} catch {\n    return $false\n}\n}\n\nif ($auditResult -eq $true) {\n    Write-Output \"[PASS]\
