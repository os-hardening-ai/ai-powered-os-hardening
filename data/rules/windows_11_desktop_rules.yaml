- id: 1.1.4
  section: '1.1'
  category: Account Policies - Password Policy
  title: Ensure 'Minimum password length' is set to '14 or more character(s)'
  description: 'This policy setting determines the least number of characters that make up a password for a user account.
    In enterprise environments, the ideal value for the Minimum password length setting is 14 characters, however you should
    adjust this value to meet your organization''s business requirements. The recommended state for this setting is: 14 or
    more character(s).'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - Computer Configuration\Policies\Windows Settings\Security Settings\Account Policies\Password Policy
  audit_command: try {
