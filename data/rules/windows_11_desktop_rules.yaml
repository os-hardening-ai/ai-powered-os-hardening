  audit_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.4/audit.ps1
  remediation_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.4/remediation.ps1
  audit_script_content: "# CIS 1.1.4 Audit - Ensure 'Minimum password length' is set to '14 or more character(s)'\n# Exit\
    \ codes: 0=PASS, 1=FAIL, 2=NOT_APPLICABLE\n\n#Requires -RunAsAdministrator\n\n$auditResult = & {\ntry {\n    $output =\
    \ net accounts 2>&1\n    $minLenLine = $output | Select-String 'Minimum password length'\n    if ($minLenLine) {\n   \
