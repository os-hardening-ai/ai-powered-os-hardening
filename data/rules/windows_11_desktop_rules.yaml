- id: 1.1.5
  section: '1.1'
  category: Account Policies - Password Policy
  title: Ensure 'Password must meet complexity requirements' is set to 'Enabled'
  description: 'This policy setting checks all new passwords to ensure that they meet basic requirements for strong passwords.
    When enabled, passwords must: not contain the user''s account name, be at least six characters in length, and contain
    characters from three of five categories (uppercase, lowercase, digits, non-alphabetic, Unicode). The recommended state
    for this setting is: Enabled.'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - Computer Configuration\Policies\Windows Settings\Security Settings\Account Policies\Password Policy
  audit_command: try {
  remediation_command: $seceditExport = "$env:TEMP\secpol_export.cfg"
  audit_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.5/audit.ps1
  remediation_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.5/remediation.ps1
  audit_script_content: "# CIS 1.1.5 Audit - Ensure 'Password must meet complexity requirements' is set to 'Enabled'\n# Exit\
    \ codes: 0=PASS, 1=FAIL, 2=NOT_APPLICABLE\n\n#Requires -RunAsAdministrator\n\n$auditResult = & {\ntry {\n    $tempFile\
    \ = \"$env:TEMP\\secpol_audit_$([guid]::NewGuid().ToString('N')).cfg\"\n    secedit /export /cfg $tempFile /quiet 2>&1\
    \ | Out-Null\n    if (Test-Path $tempFile) {\n        $content = Get-Content $tempFile -Raw\n        Remove-Item $tempFile\
    \ -Force -ErrorAction SilentlyContinue\n        if ($content -match 'PasswordComplexity\\s*=\\s*(\\d+)') {\n         \
    \   return ([int]$Matches[1] -eq 1)\n        }\n    }\n    return $false\n} catch {\n    return $false\n}\n}\n\nif ($auditResult\
    \ -eq $true) {\n    Write-Output \"[PASS] Rule 1.1.5: Compliant\"\n    exit 0\n} elseif ($null -eq $auditResult) {\n \
    \   Write-Output \"[INFO] Rule 1.1.5: Not applicable on this system\"\n    exit 2\n} else {\n    Write-Output \"[FAIL]\
    \ Rule 1.1.5: Not compliant\"\n    exit 1\n}"
  remediation_script_content: "# CIS 1.1.5 Remediation - Ensure 'Password must meet complexity requirements' is set to 'Enabled'\n\
    \n#Requires -RunAsAdministrator\n\nWrite-Output \"[REMEDIATE] Applying rule 1.1.5...\"\n\ntry {\n$seceditExport = \"$env:TEMP\\\
    secpol_export.cfg\"\n$seceditImport = \"$env:TEMP\\secpol_import.cfg\"\nsecedit /export /cfg $seceditExport /quiet\n$content\
    \ = Get-Content $seceditExport\n$content = $content -replace 'PasswordComplexity\\s*=\\s*\\d+', 'PasswordComplexity =\
    \ 1'\nif ($content -notmatch 'PasswordComplexity') {\n    $content = $content -replace '(\\[System Access\\])', \"`$1`nPasswordComplexity\
    \ = 1\"\n}\n$content | Set-Content $seceditImport -Force\nsecedit /configure /db secedit.sdb /cfg $seceditImport /quiet\n\
    Remove-Item $seceditExport, $seceditImport -Force -ErrorAction SilentlyContinue\n    Write-Output \"[SUCCESS] Rule 1.1.5:\
    \ Applied\"\n} catch {\n    Write-Output \"[ERROR] Rule 1.1.5: $($_.Exception.Message)\"\n    exit 1\n}"
