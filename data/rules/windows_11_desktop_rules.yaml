  audit_command: try {
  remediation_command: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\SAM' -Name 'RelaxMinimumPasswordLengthLimits'
    -Value 1 -Type DWord -Force
  audit_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.6/audit.ps1
  remediation_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.6/remediation.ps1
  audit_script_content: "# CIS 1.1.6 Audit - Ensure 'Relax minimum password length limits' is set to 'Enabled'\n# Exit codes:\
