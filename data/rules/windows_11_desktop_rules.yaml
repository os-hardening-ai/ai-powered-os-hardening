- id: 1.1.7
  section: '1.1'
  category: Account Policies - Password Policy
  title: Ensure 'Store passwords using reversible encryption' is set to 'Disabled'
  description: 'This policy setting determines whether the operating system stores passwords in a way that uses reversible
    encryption, which provides support for application protocols that require knowledge of the user''s password for authentication
    purposes. Passwords that are stored with reversible encryption are essentially the same as plaintext versions of the passwords.
    The recommended state for this setting is: Disabled.'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - Computer Configuration\Policies\Windows Settings\Security Settings\Account Policies\Password Policy
  audit_command: try {
  remediation_command: $seceditExport = "$env:TEMP\secpol_export.cfg"
  audit_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.7/audit.ps1
  remediation_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.7/remediation.ps1
  audit_script_content: "# CIS 1.1.7 Audit - Ensure 'Store passwords using reversible encryption' is set to 'Disabled'\n#\
    \ Exit codes: 0=PASS, 1=FAIL, 2=NOT_APPLICABLE\n\n#Requires -RunAsAdministrator\n\n$auditResult = & {\ntry {\n    $tempFile\
    \ = \"$env:TEMP\\secpol_audit_$([guid]::NewGuid().ToString('N')).cfg\"\n    secedit /export /cfg $tempFile /quiet 2>&1\
    \ | Out-Null\n    if (Test-Path $tempFile) {\n        $content = Get-Content $tempFile -Raw\n        Remove-Item $tempFile\
    \ -Force -ErrorAction SilentlyContinue\n        if ($content -match 'ClearTextPassword\\s*=\\s*(\\d+)') {\n          \
    \  return ([int]$Matches[1] -eq 0)\n        }\n        # If not explicitly set, default is 0 (Disabled)\n        return\
    \ $true\n    }\n    return $false\n} catch {\n    return $false\n}\n}\n\nif ($auditResult -eq $true) {\n    Write-Output\
    \ \"[PASS] Rule 1.1.7: Compliant\"\n    exit 0\n} elseif ($null -eq $auditResult) {\n    Write-Output \"[INFO] Rule 1.1.7:\
    \ Not applicable on this system\"\n    exit 2\n} else {\n    Write-Output \"[FAIL] Rule 1.1.7: Not compliant\"\n    exit\
    \ 1\n}"
  remediation_script_content: "# CIS 1.1.7 Remediation - Ensure 'Store passwords using reversible encryption' is set to 'Disabled'\n\
    \n#Requires -RunAsAdministrator\n\nWrite-Output \"[REMEDIATE] Applying rule 1.1.7...\"\n\ntry {\n$seceditExport = \"$env:TEMP\\\
    secpol_export.cfg\"\n$seceditImport = \"$env:TEMP\\secpol_import.cfg\"\nsecedit /export /cfg $seceditExport /quiet\n$content\
    \ = Get-Content $seceditExport\n$content = $content -replace 'ClearTextPassword\\s*=\\s*\\d+', 'ClearTextPassword = 0'\n\
