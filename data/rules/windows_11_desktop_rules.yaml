rules:
- id: 1.1.1
  section: '1.1'
  category: Account Policies - Password Policy
  title: Ensure 'Enforce password history' is set to '24 or more password(s)'
  description: 'This policy setting determines the number of renewed, unique passwords that have to be associated with a user
    account before you can reuse an old password. The value for this policy setting must be between 0 and 24 passwords. The
    default value for standalone systems is 0 passwords, but the default setting when joined to a domain is 24 passwords.
    To maintain the effectiveness of this policy setting, use the Minimum password age setting to prevent users from repeatedly
    changing their password. The recommended state for this setting is: 24 or more password(s).'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - Computer Configuration\Policies\Windows Settings\Security Settings\Account Policies\Password Policy
  audit_command: try {
  remediation_command: net accounts /uniquepw:24
  audit_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.1/audit.ps1
  remediation_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.1/remediation.ps1
  audit_script_content: "# CIS 1.1.1 Audit - Ensure 'Enforce password history' is set to '24 or more password(s)'\n# Exit\
    \ codes: 0=PASS, 1=FAIL, 2=NOT_APPLICABLE\n\n#Requires -RunAsAdministrator\n\n$auditResult = & {\ntry {\n    $output =\
    \ net accounts 2>&1\n    $historyLine = $output | Select-String 'Length of password history maintained'\n    if ($historyLine)\
    \ {\n        $value = [int]($historyLine -replace '.*:\\s*(\\d+).*', '$1')\n        return ($value -ge 24)\n    }\n  \
    \  \n    # Alternative: Check via secedit export\n    $tempFile = \"$env:TEMP\\secpol_audit_$([guid]::NewGuid().ToString('N')).cfg\"\
    \n    secedit /export /cfg $tempFile /quiet 2>&1 | Out-Null\n    \n    if (Test-Path $tempFile) {\n        $content =\
    \ Get-Content $tempFile -Raw\n        Remove-Item $tempFile -Force -ErrorAction SilentlyContinue\n        \n        if\
    \ ($content -match 'PasswordHistorySize\\s*=\\s*(\\d+)') {\n            $value = [int]$Matches[1]\n            return\
    \ ($value -ge 24)\n        }\n    }\n    \n    return $false\n} catch {\n    return $false\n}\n}\n\nif ($auditResult -eq\
    \ $true) {\n    Write-Output \"[PASS] Rule 1.1.1: Compliant\"\n    exit 0\n} elseif ($null -eq $auditResult) {\n    Write-Output\
    \ \"[INFO] Rule 1.1.1: Not applicable on this system\"\n    exit 2\n} else {\n    Write-Output \"[FAIL] Rule 1.1.1: Not\
    \ compliant\"\n    exit 1\n}"
  remediation_script_content: "# CIS 1.1.1 Remediation - Ensure 'Enforce password history' is set to '24 or more password(s)'\n\
    \n#Requires -RunAsAdministrator\n\nWrite-Output \"[REMEDIATE] Applying rule 1.1.1...\"\n\ntry {\n$seceditExport = \"$env:TEMP\\\
    secpol_export.cfg\"\n$seceditImport = \"$env:TEMP\\secpol_import.cfg\"\n\n# Export current security policy\nsecedit /export\
    \ /cfg $seceditExport /quiet\n\n# Read and modify\n$content = Get-Content $seceditExport\n$content = $content -replace\
    \ 'PasswordHistorySize\\s*=\\s*\\d+', 'PasswordHistorySize = 24'\n\n# If setting doesn't exist, add it\nif ($content -notmatch\
    \ 'PasswordHistorySize') {\n    $content = $content -replace '(\\[System Access\\])', \"`$1`nPasswordHistorySize = 24\"\
    \n}\n\n$content | Set-Content $seceditImport -Force\n\n# Import modified policy\nsecedit /configure /db secedit.sdb /cfg\
    \ $seceditImport /quiet\n\n# Cleanup\nRemove-Item $seceditExport, $seceditImport -Force -ErrorAction SilentlyContinue\n\
    \    Write-Output \"[SUCCESS] Rule 1.1.1: Applied\"\n} catch {\n    Write-Output \"[ERROR] Rule 1.1.1: $($_.Exception.Message)\"\
    \n    exit 1\n}"
  tags:
  - password
  - account-policy
  - authentication
  - level-1
  - automated
  - password-history
  policy_setting: Enforce password history
  gpo_path: Computer Configuration\Policies\Windows Settings\Security Settings\Account Policies\Password Policy
- id: 1.1.2
  section: '1.1'
  category: Account Policies - Password Policy
  title: Ensure 'Maximum password age' is set to '365 or fewer days, but not 0'
  description: This policy setting defines how long a user can use their password before it expires. Values for this policy
    setting range from 0 to 999 days. If you set the value to 0, the password will never expire. Because attackers can crack
    passwords, the more frequently you change the password the less opportunity an attacker has to use a cracked password.
    The recommended state for this setting is 365 or fewer days, but not 0.
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - Computer Configuration\Policies\Windows Settings\Security Settings\Account Policies\Password Policy
  audit_command: try {
  remediation_command: net accounts /maxpwage:365
  audit_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.2/audit.ps1
  remediation_script: KURALLAR/KURALLAR/platforms/windows/rules/S1_Account_Policies/1.1.2/remediation.ps1
  audit_script_content: "# CIS 1.1.2 Audit - Ensure 'Maximum password age' is set to '365 or fewer days, but not 0'\n# Exit\
    \ codes: 0=PASS, 1=FAIL, 2=NOT_APPLICABLE\n\n#Requires -RunAsAdministrator\n\n$auditResult = & {\ntry {\n    $output =\
    \ net accounts 2>&1\n    $maxAgeLine = $output | Select-String 'Maximum password age'\n    if ($maxAgeLine) {\n      \
    \  $valueStr = ($maxAgeLine -replace '.*:\\s*', '').Trim()\n        if ($valueStr -match 'Unlimited' -or $valueStr -eq\
    \ '0') {\n            return $false\n        }\n        $value = [int]($valueStr -replace '[^0-9]', '')\n        return\
    \ ($value -ge 1 -and $value -le 365)\n    }\n    return $false\n} catch {\n    return $false\n}\n}\n\nif ($auditResult\
    \ -eq $true) {\n    Write-Output \"[PASS] Rule 1.1.2: Compliant\"\n    exit 0\n} elseif ($null -eq $auditResult) {\n \
    \   Write-Output \"[INFO] Rule 1.1.2: Not applicable on this system\"\n    exit 2\n} else {\n    Write-Output \"[FAIL]\
    \ Rule 1.1.2: Not compliant\"\n    exit 1\n}"
  remediation_script_content: "# CIS 1.1.2 Remediation - Ensure 'Maximum password age' is set to '365 or fewer days, but not\
    \ 0'\n\n#Requires -RunAsAdministrator\n\nWrite-Output \"[REMEDIATE] Applying rule 1.1.2...\"\n\ntry {\n$seceditExport\
    \ = \"$env:TEMP\\secpol_export.cfg\"\n$seceditImport = \"$env:TEMP\\secpol_import.cfg\"\nsecedit /export /cfg $seceditExport\
    \ /quiet\n$content = Get-Content $seceditExport\n$content = $content -replace 'MaximumPasswordAge\\s*=\\s*\\d+', 'MaximumPasswordAge\
    \ = 365'\nif ($content -notmatch 'MaximumPasswordAge') {\n    $content = $content -replace '(\\[System Access\\])', \"\
    `$1`nMaximumPasswordAge = 365\"\n}\n$content | Set-Content $seceditImport -Force\nsecedit /configure /db secedit.sdb /cfg\
    \ $seceditImport /quiet\nRemove-Item $seceditExport, $seceditImport -Force -ErrorAction SilentlyContinue\n    Write-Output\
    \ \"[SUCCESS] Rule 1.1.2: Applied\"\n} catch {\n    Write-Output \"[ERROR] Rule 1.1.2: $($_.Exception.Message)\"\n   \
    \ exit 1\n}"
  tags:
  - password
  - account-policy
  - authentication
  - level-1
  - automated
  - password-age
  policy_setting: Maximum password age
  gpo_path: Computer Configuration\Policies\Windows Settings\Security Settings\Account Policies\Password Policy
- id: 1.1.3
  section: '1.1'
