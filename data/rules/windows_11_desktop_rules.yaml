  category: Account Policies - Password Policy
  title: Ensure 'Relax minimum password length limits' is set to 'Enabled'
  description: 'This policy setting determines whether the minimum password length setting can be increased beyond the legacy
    limit of 14 characters. The recommended state for this setting is: Enabled. Note: This setting only affects local accounts
    on the computer. Domain accounts are only affected by settings on the Domain Controllers.'
  level: 1
  auto_remediate: true
  manual_review: false
  config_files:
  - HKLM:\System\CurrentControlSet\Control\SAM
