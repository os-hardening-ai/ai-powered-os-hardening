global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: "hardening-ai"
    env: "development"

scrape_configs:
  # AI-Powered OS Hardening Backend
  - job_name: "hardening-backend"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics/prometheus
    scrape_interval: 15s

  # OpenTelemetry Collector (custom app metrics via OTLP)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    scrape_interval: 15s
