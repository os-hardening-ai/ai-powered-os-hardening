receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Add resource attributes for better identification
  resource:
    attributes:
      - key: service.namespace
        value: "hardening-ai"
        action: upsert

exporters:
  # Export metrics to Prometheus format (scraped by Prometheus)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "hardening"
    const_labels:
      project: "os-hardening-ai"

  # Debug logging (warn level to avoid noise)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [debug]

    metrics:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
