[pytest]
# Pytest Configuration for AI-Powered OS Hardening
# Professional Test Suite Configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    blackbox: Black-box functional tests
    whitebox: White-box structural tests
    e2e: End-to-end system tests
    performance: Performance and load tests
    slow: Tests that take significant time
    api: API endpoint tests
    llm: LLM pipeline tests
    rag: RAG system tests
    ml: Machine learning component tests
    security: Security-focused tests
    smoke: Quick smoke tests
    regression: Regression test suite
    critical: Critical functionality tests

# Console output options
console_output_style = progress
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra
    -p no:selenium

# Coverage options
[coverage:run]
source = api,llm,config
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/reports/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s:%(lineno)d - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Asyncio configuration
asyncio_mode = auto

# Timeout configuration (in seconds)
timeout = 300
timeout_method = thread

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::FutureWarning
